<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Classroom - myclassbd.shop</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #667eea;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #0f0f12; 
            color: #e0e0e0; 
            height: 100vh; 
            overflow: hidden;
        }

        .login-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-secondary {
            background: #f1f3f5;
            color: #333;
        }

        .app { display: none; height: 100vh; background: #0f0f12; }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0; top: 0;
            width: 100%; max-width: 360px;
            height: 100%;
            background: #1a1721;
            z-index: 100;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            background: var(--primary-gradient);
            color: white;
        }

        .group-item {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid #2a2633;
        }

        .group-item:hover {
            background: #25222e;
        }

        .group-avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            flex-shrink: 0;
        }

        .chat-area {
            margin-left: 360px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #121016;
        }

        .chat-header {
            padding: 15px 20px;
            background: #1e1b24;
            border-bottom: 1px solid #2a2633;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
        }

        .message.sent {
            align-self: flex-end;
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: #2a2633;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 12px 16px;
            background: #1e1b24;
            border-top: 1px solid #2a2633;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 50px;
            background: #2a2633;
            color: white;
        }

        .video-call-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .chat-area { margin-left: 0; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h1>📚 Pocket Classroom</h1>
            <p style="text-align:center; color:#666; margin-bottom:25px;">myclassbd.shop</p>
            
            <input type="email" id="loginEmail" class="input-field" placeholder="ইমেইল">
            <input type="password" id="loginPassword" class="input-field" placeholder="পাসওয়ার্ড">
            
            <button class="btn btn-primary" onclick="login()">লগইন</button>
            <button class="btn btn-secondary" onclick="showRegisterModal()">নতুন অ্যাকাউন্ট তৈরি করুন</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Pocket Classroom</h2>
                <div style="margin-top:15px; display:flex; justify-content:space-between; align-items:center;">
                    <span id="userEmail" style="font-size:14px; opacity:0.9;"></span>
                    <button onclick="logout()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:6px 12px; border-radius:20px; cursor:pointer;">লগআউট</button>
                </div>
            </div>

            <div style="padding:15px;">
                <input type="text" id="searchInput" placeholder="গ্রুপ খুঁজুন..." style="width:100%; padding:12px; border-radius:50px; border:none; background:#2a2633; color:white;">
            </div>

            <div style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                <h3>📚 আমার ক্লাসসমূহ</h3>
                <button onclick="showCreateGroupModal()" style="background:var(--primary); color:white; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer;">+</button>
            </div>

            <div id="groupList"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <button onclick="closeChat()" style="background:none; border:none; font-size:24px; color:white; cursor:pointer;">←</button>
                <div style="flex:1;">
                    <h3 id="currentGroupName" style="color:white;"></h3>
                    <small id="currentGroupNumber" style="color:#888;"></small>
                </div>
                <button onclick="startVideoCall()" class="video-call-btn">
                    <i class="fas fa-video"></i> ভিডিও কল
                </button>
            </div>

            <div class="messages-container" id="messagesContainer"></div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="মেসেজ লিখুন...">
                <button onclick="uploadImage()" style="background:#2a2633; color:white; border:none; width:48px; height:48px; border-radius:50%;">📷</button>
                <button onclick="sendMessage()" style="background:var(--primary); color:white; border:none; width:48px; height:48px; border-radius:50%;">➤</button>
            </div>
        </div>
    </div>

    <!-- Create Group Modal -->
    <div id="createGroupModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
        <div style="background:#1e1b24; padding:30px; border-radius:20px; width:90%; max-width:420px;">
            <h3>নতুন ক্লাস তৈরি করুন</h3>
            <input type="text" id="newGroupName" class="input-field" placeholder="ক্লাসের নাম">
            <input type="text" id="newGroupNumber" class="input-field" placeholder="গ্রুপ নম্বর (যেমন: MATH101)">
            <button onclick="createGroup()" class="btn btn-primary">তৈরি করুন</button>
            <button onclick="closeModal('createGroupModal')" class="btn btn-secondary">বাতিল</button>
        </div>
    </div>

    <script>
        // ==================== Firebase Config ====================
        const firebaseConfig = {
            apiKey: "AIzaSyDTxzgfZ8IuPpqp4Q20cE8JZvif32pDhgc",
            authDomain: "my-class-46989.firebaseapp.com",
            projectId: "my-class-46989",
            storageBucket: "my-class-46989.firebasestorage.app",
            messagingSenderId: "716703687515",
            appId: "1:716703687515:web:b9a11736e7f58e071c307e",
            databaseURL: "https://my-class-46989-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        let currentUser = null;
        let currentGroupId = null;
        let messageListener = null;

        // ==================== Auth State ====================
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('userEmail').innerText = user.email;
                loadUserGroups();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // ==================== Basic Functions ====================
        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) return alert("ইমেইল ও পাসওয়ার্ড দিন");

            auth.signInWithEmailAndPassword(email, password)
                .catch(err => alert("লগইন ব্যর্থ: " + err.message));
        }

        function showRegisterModal() {
            const email = prompt("ইমেইল দিন:");
            const password = prompt("পাসওয়ার্ড দিন (কমপক্ষে 6 অক্ষর):");
            if (!email || !password) return;

            auth.createUserWithEmailAndPassword(email, password)
                .then(() => alert("অ্যাকাউন্ট তৈরি সফল! এখন লগইন করুন।"))
                .catch(err => alert("রেজিস্ট্রেশন ব্যর্থ: " + err.message));
        }

        function logout() {
            auth.signOut();
        }

        // ==================== Group Management ====================
        async function loadUserGroups() {
            const groupList = document.getElementById('groupList');
            groupList.innerHTML = '';

            db.ref(`userGroups/${currentUser.uid}`).on('value', async (snapshot) => {
                groupList.innerHTML = '';
                const data = snapshot.val() || {};

                for (let groupId in data) {
                    const groupSnap = await db.ref(`groups/${groupId}`).once('value');
                    const group = groupSnap.val();
                    if (!group) continue;

                    const div = document.createElement('div');
                    div.className = 'group-item';
                    div.innerHTML = `
                        <div class="group-avatar">${group.name ? group.name[0].toUpperCase() : 'G'}</div>
                        <div>
                            <div style="font-weight:600;">${group.name}</div>
                            <div style="font-size:12px; color:#888;">${group.groupNumber || ''}</div>
                        </div>
                    `;
                    div.onclick = () => openGroup(groupId, group);
                    groupList.appendChild(div);
                }
            });
        }

        function showCreateGroupModal() {
            document.getElementById('createGroupModal').style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        async function createGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            let number = document.getElementById('newGroupNumber').value.trim();

            if (!name) return alert("ক্লাসের নাম দিন");

            if (!number) number = "CLASS" + Math.floor(Math.random()*10000);

            // Check duplicate group number
            const existing = await db.ref('groups').orderByChild('groupNumber').equalTo(number).once('value');
            if (existing.exists()) return alert("এই গ্রুপ নম্বরটি ইতিমধ্যে ব্যবহৃত হয়েছে!");

            const groupId = db.ref('groups').push().key;

            await db.ref(`groups/${groupId}`).set({
                name: name,
                groupNumber: number,
                admin: currentUser.uid,
                createdAt: Date.now(),
                members: {
                    [currentUser.uid]: {
                        email: currentUser.email,
                        role: 'admin',
                        joinedAt: Date.now()
                    }
                }
            });

            await db.ref(`userGroups/${currentUser.uid}/${groupId}`).set(true);

            closeModal('createGroupModal');
            alert("ক্লাস সফলভাবে তৈরি হয়েছে!");
        }

        function openGroup(groupId, group) {
            currentGroupId = groupId;
            document.getElementById('currentGroupName').innerText = group.name;
            document.getElementById('currentGroupNumber').innerText = group.groupNumber || '';
            document.getElementById('chatArea').style.display = 'flex';
            loadMessages(groupId);
        }

        function closeChat() {
            document.getElementById('chatArea').style.display = 'none';
            if (messageListener) messageListener.off();
        }

        // ==================== Messaging ====================
        function loadMessages(groupId) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';

            messageListener = db.ref(`messages/${groupId}`).on('value', (snapshot) => {
                container.innerHTML = '';
                const messages = snapshot.val() || {};
                
                Object.values(messages).sort((a,b) => a.timestamp - b.timestamp).forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
                    div.innerHTML = `
                        <strong style="font-size:12px;">${msg.senderEmail || 'Unknown'}</strong><br>
                        ${msg.text || ''}
                        ${msg.imageUrl ? `<br><img src="${msg.imageUrl}" style="max-width:220px; border-radius:12px; margin-top:8px;">` : ''}
                        <small style="display:block; margin-top:5px; opacity:0.7;">${new Date(msg.timestamp).toLocaleTimeString()}</small>
                    `;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentGroupId) return;

            db.ref(`messages/${currentGroupId}`).push({
                text: text,
                senderId: currentUser.uid,
                senderEmail: currentUser.email,
                timestamp: Date.now()
            });

            input.value = '';
        }

        function uploadImage() {
            cloudinary.createUploadWidget({
                cloudName: "debga1ysk",
                uploadPreset: "my class"
            }, (err, res) => {
                if (!err && res && res.event === "success") {
                    db.ref(`messages/${currentGroupId}`).push({
                        imageUrl: res.info.secure_url,
                        senderId: currentUser.uid,
                        senderEmail: currentUser.email,
                        timestamp: Date.now()
                    });
                }
            }).open();
        }

        // ==================== Video Call Integration ====================
        function startVideoCall() {
            if (!currentGroupId) return alert("প্রথমে একটি গ্রুপ খুলুন");
            
            const videoCallUrl = `https://meet.myclassbd.shop/group/classroom`;
            window.open(videoCallUrl, '_blank');
        }

        // Enter key support
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
