<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube - Professional Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Roboto', Arial, sans-serif; margin: 0; background: #fff; color: #0f0f0f; }
        
        /* Header */
        header { 
            position: sticky; top: 0; background: white; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px; border-bottom: 1px solid #eee;
        }
        .logo { color: #f00; font-size: 20px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .search-area { flex: 0 1 600px; display: flex; margin: 0 20px; }
        .search-area input { width: 100%; padding: 8px 15px; border: 1px solid #ccc; border-radius: 20px 0 0 20px; outline: none; }
        .search-area button { padding: 8px 20px; border: 1px solid #ccc; border-left: none; border-radius: 0 20px 20px 0; cursor: pointer; background: #f8f8f8; }

        /* Main Layout (YouTube Style) */
        .page-container { display: flex; flex-direction: column; max-width: 1400px; margin: 0 auto; padding-top: 10px; }
        
        .main-content { flex: 3; padding: 0 15px; }
        .sidebar-content { flex: 1.2; padding: 0 15px; }

        /* Video Player Section */
        #playerSection { display: none; margin-bottom: 20px; }
        .video-box { width: 100%; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        video { width: 100%; display: block; aspect-ratio: 16/9; }

        /* Title & Buttons */
        .video-info { padding: 15px 0; border-bottom: 1px solid #eee; }
        .video-info h2 { font-size: 20px; margin: 0 0 10px 0; }
        .action-row { display: flex; gap: 10px; align-items: center; }
        .btn { 
            padding: 8px 16px; border-radius: 20px; border: none; cursor: pointer; 
            font-weight: 500; display: flex; align-items: center; gap: 5px; background: #f2f2f2;
        }
        .btn-down { background: #3ecf8e; color: white; }

        /* Video List (Sidebar/Grid) */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); gap: 15px; }
        .v-card { display: flex; flex-direction: column; cursor: pointer; gap: 10px; }
        .v-card video { width: 100%; border-radius: 10px; pointer-events: none; }
        .v-card h4 { margin: 0; font-size: 14px; line-height: 1.4; color: #0f0f0f; }

        /* Desktop Mode (Two Columns) */
        @media (min-width: 1000px) {
            .page-container { flex-direction: row; padding: 20px; }
            .v-card { flex-direction: row; align-items: flex-start; }
            .v-card video { width: 168px; height: 94px; }
            .video-grid { grid-template-columns: 1fr; }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .search-area { display: none; } /* মোবাইলে স্পেস বাঁচাতে */
            header { padding: 10px; }
            .main-content { padding: 0; }
        }
    </style>
</head>
<body>

<header>
    <a href="view.html" class="logo">MyTube</a>
    <div class="search-area">
        <input type="text" id="searchInput" placeholder="সার্চ করুন...">
        <button onclick="searchVideos()">🔍</button>
    </div>
    <div style="width: 40px;"></div> </header>

<div class="page-container">
    <div class="main-content">
        <div id="playerSection">
            <div class="video-box">
                <video id="mainPlayer" controls playsinline preload="auto"></video>
            </div>
            <div class="video-info">
                <h2 id="videoTitle">ভিডিও টাইটেল</h2>
                <div class="action-row">
                    <button class="btn" id="likeBtn" onclick="handleLike()">
                        👍 <span id="likeCount">0</span>
                    </button>
                    <button class="btn btn-down" id="downBtn" onclick="downloadVideo()">⬇️ ডাউনলোড</button>
                </div>
            </div>
        </div>
        
        </div>

    <div class="sidebar-content">
        <h4 id="galleryTitle">পরবর্তী ভিডিও</h4>
        <div class="video-grid" id="videoGrid">
            <p>ভিডিও লোড হচ্ছে...</p>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://zlzpfnhnfhtanuvaskjy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allVideos = [];
    let currentVideo = null;

    async function fetchVideos() {
        const { data, error } = await _supabase.from('video_list').select('*').order('created_at', { ascending: false });
        if (error) return;
        allVideos = data;
        renderGallery(data);
    }

    function renderGallery(videos) {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = videos.length ? "" : "কোনো ভিডিও পাওয়া যায়নি।";
        
        videos.forEach(v => {
            const card = document.createElement('div');
            card.className = 'v-card';
            card.onclick = () => playVideo(v);
            card.innerHTML = `
                <video src="${v.url}#t=0.5" muted playsinline></video>
                <div>
                    <h4>${v.title}</h4>
                    <small style="color:#606060">${v.likes || 0} লাইক</small>
                </div>`;
            grid.appendChild(card);
        });
    }

    function playVideo(video) {
        currentVideo = video;
        const playerSection = document.getElementById('playerSection');
        const player = document.getElementById('mainPlayer');
        
        playerSection.style.display = 'block';
        player.src = video.url;
        player.load(); // মোবাইলে লোড নিশ্চিত করতে
        
        // মোবাইলে ভিডিও প্লেয়ারে সরাসরি নিয়ে যাওয়া
        if (window.innerWidth < 1000) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        player.play().catch(() => {
            console.log("Auto-play blocked by browser. Please click play button.");
        });

        document.getElementById('videoTitle').innerText = video.title;
        document.getElementById('likeCount').innerText = video.likes || 0;
        
        // লাইক চেক (Local Storage)
        const likedList = JSON.parse(localStorage.getItem('myLikedVideos') || '[]');
        const likeBtn = document.getElementById('likeBtn');
        if (likedList.includes(video.id)) {
            likeBtn.style.background = "#e0e0e0";
            likeBtn.disabled = true;
        } else {
            likeBtn.style.background = "#f2f2f2";
            likeBtn.disabled = false;
        }
    }

    async function handleLike() {
        if (!currentVideo) return;
        const likedList = JSON.parse(localStorage.getItem('myLikedVideos') || '[]');
        if (likedList.includes(currentVideo.id)) return;

        const newLikes = (currentVideo.likes || 0) + 1;
        const { error } = await _supabase.from('video_list').update({ likes: newLikes }).eq('id', currentVideo.id);

        if (!error) {
            document.getElementById('likeCount').innerText = newLikes;
            likedList.push(currentVideo.id);
            localStorage.setItem('myLikedVideos', JSON.stringify(likedList));
            document.getElementById('likeBtn').disabled = true;
        }
    }

    async function downloadVideo() {
        if (!currentVideo) return;
        const btn = document.getElementById('downBtn');
        const originalText = btn.innerText;
        btn.innerText = "ডাউনলোড হচ্ছে...";
        btn.disabled = true;

        try {
            const res = await fetch(currentVideo.url);
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentVideo.title}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        } catch (e) {
            alert("ডাউনলোড করতে সুপাবেস CORS সেটিংস ঠিক করুন!");
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    function searchVideos() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        renderGallery(allVideos.filter(v => v.title.toLowerCase().includes(q)));
    }

    fetchVideos();
</script>
</body>
</html>
