<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube - Professional Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --yt-red: #f00; --bg-color: #fff; --text-color: #0f0f0f; }
        body { font-family: 'Roboto', Arial, sans-serif; margin: 0; background: var(--bg-color); color: var(--text-color); }
        
        /* Header */
        header { 
            position: sticky; top: 0; background: white; z-index: 1000; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 20px; border-bottom: 1px solid #eee; 
        }
        .logo { color: var(--yt-red); font-size: 22px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .search-area { flex: 0 1 600px; display: flex; margin: 0 20px; }
        .search-area input { width: 100%; padding: 8px 15px; border: 1px solid #ccc; border-radius: 20px 0 0 20px; outline: none; }
        .search-area button { padding: 8px 20px; border: 1px solid #ccc; border-left: none; border-radius: 0 20px 20px 0; cursor: pointer; background: #f8f8f8; }

        /* Container */
        .page-container { display: flex; flex-direction: column; max-width: 100%; margin: 0 auto; padding: 15px; }

        /* Initial Home Grid (YouTube Desktop Style) */
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        /* Video Card */
        .v-card { cursor: pointer; display: flex; flex-direction: column; gap: 10px; }
        .v-card video { width: 100%; aspect-ratio: 16/9; border-radius: 12px; object-fit: cover; background: #000; }
        .v-info h4 { margin: 0; font-size: 16px; line-height: 1.4; color: var(--text-color); }
        .v-info small { color: #606060; font-size: 13px; }

        /* Player Section (Hidden by default) */
        #playerSection { display: none; margin-bottom: 30px; }
        .video-box { width: 100%; background: #000; border-radius: 12px; overflow: hidden; }
        video#mainPlayer { width: 100%; aspect-ratio: 16/9; display: block; }
        
        .video-details { padding: 15px 0; }
        .video-details h2 { font-size: 20px; margin: 0 0 15px 0; }
        .action-row { display: flex; gap: 10px; align-items: center; }
        .btn { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 8px; background: #f2f2f2; text-decoration: none; color: black; }
        .btn-down { background: #3ecf8e; color: white; }

        /* DESKTOP WATCH MODE (YouTube Layout) */
        @media (min-width: 1000px) {
            .watch-mode { flex-direction: row; padding: 20px 5%; gap: 24px; }
            .watch-mode .main-content { flex: 2.5; }
            .watch-mode .sidebar-content { flex: 1; }
            
            /* সাইডবারে যখন লিস্ট যাবে তখন ডিজাইন পরিবর্তন */
            .watch-mode .video-grid { grid-template-columns: 1fr; }
            .watch-mode .v-card { flex-direction: row; align-items: flex-start; }
            .watch-mode .v-card video { width: 168px; height: 94px; }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .search-area { display: none; }
            .video-grid { grid-template-columns: 1fr; }
            header { padding: 10px; }
        }
    </style>
</head>
<body>

<header>
    <a href="view.html" class="logo">MyTube</a>
    <div class="search-area">
        <input type="text" id="searchInput" placeholder="সার্চ করুন...">
        <button onclick="searchVideos()">🔍</button>
    </div>
</header>

<div class="page-container" id="mainLayout">
    <div class="main-content">
        <div id="playerSection">
            <div class="video-box">
                <video id="mainPlayer" controls playsinline></video>
            </div>
            <div class="video-details">
                <h2 id="videoTitle">লোডিং...</h2>
                <div class="action-row">
                    <button class="btn" id="likeBtn" onclick="handleLike()">👍 <span id="likeCount">0</span></button>
                    <a id="downloadBtn" class="btn btn-down" href="#" download>⬇️ ডাউনলোড</a>
                </div>
            </div>
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            <h4 id="nextLabel" style="display:none;">পরবর্তী ভিডিও</h4>
        </div>
    </div>

    <div class="sidebar-content">
        <div class="video-grid" id="videoGrid">
            <p>ভিডিও লোড হচ্ছে...</p>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://zlzpfnhnfhtanuvaskjy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allVideos = [];
    let currentVideo = null;

    async function init() {
        const { data, error } = await _supabase.from('video_list').select('*').order('created_at', { ascending: false });
        if (!error) {
            allVideos = data;
            render(data);
        }
    }

    function render(list) {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = "";
        list.forEach(v => {
            const card = document.createElement('div');
            card.className = 'v-card';
            card.onclick = () => play(v);
            card.innerHTML = `
                <video src="${v.url}#t=0.5" muted playsinline></video>
                <div class="v-info">
                    <h4>${v.title}</h4>
                    <small>${v.likes || 0} লাইক</small>
                </div>`;
            grid.appendChild(card);
        });
    }

    function play(video) {
        currentVideo = video;
        const player = document.getElementById('mainPlayer');
        const layout = document.getElementById('mainLayout');
        
        // ডেক্সটপ লেআউট পরিবর্তন (YouTube Watch Style)
        layout.classList.add('watch-mode');
        document.getElementById('playerSection').style.display = 'block';
        document.getElementById('nextLabel').style.display = 'block';

        player.src = video.url;
        player.load();
        player.play();

        document.getElementById('videoTitle').innerText = video.title;
        document.getElementById('likeCount').innerText = video.likes || 0;
        
        // ডাউনলোড লিঙ্ক আপডেট
        const dBtn = document.getElementById('downloadBtn');
        dBtn.href = video.url;
        dBtn.setAttribute('download', `${video.title}.mp4`);

        // লাইক চেক
        const liked = JSON.parse(localStorage.getItem('my_likes') || '[]');
        const lBtn = document.getElementById('likeBtn');
        lBtn.disabled = liked.includes(video.id);
        lBtn.style.opacity = lBtn.disabled ? "0.5" : "1";

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function handleLike() {
        if (!currentVideo) return;
        const liked = JSON.parse(localStorage.getItem('my_likes') || '[]');
        if (liked.includes(currentVideo.id)) return;

        const newLikes = (currentVideo.likes || 0) + 1;
        await _supabase.from('video_list').update({ likes: newLikes }).eq('id', currentVideo.id);

        document.getElementById('likeCount').innerText = newLikes;
        liked.push(currentVideo.id);
        localStorage.setItem('my_likes', JSON.stringify(liked));
        document.getElementById('likeBtn').disabled = true;
        document.getElementById('likeBtn').style.opacity = "0.5";
    }

    function searchVideos() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        render(allVideos.filter(v => v.title.toLowerCase().includes(q)));
    }

    init();
</script>
</body>
</html>
