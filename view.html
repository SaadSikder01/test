<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube - Responsive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; color: #0f0f0f; }
        
        header { 
            background: #fff; padding: 10px 15px; display: flex; align-items: center; 
            justify-content: space-between; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; 
        }
        .search-bar { flex: 1; margin: 0 10px; display: flex; }
        .search-bar input { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 20px 0 0 20px; outline: none; font-size: 14px; }
        .search-bar button { padding: 8px 12px; border: 1px solid #ccc; border-left: none; border-radius: 0 20px 20px 0; background: #f8f8f8; cursor: pointer; }

        .main-container { display: flex; flex-direction: column; width: 100%; }
        
        /* Player Section */
        .player-section { width: 100%; display: none; }
        video { width: 100%; aspect-ratio: 16 / 9; background: #000; display: block; }
        
        .video-details { padding: 15px; box-sizing: border-box; width: 100%; }
        .video-details h3 { margin: 0 0 12px 0; font-size: 18px; word-wrap: break-word; }
        
        .action-buttons { display: flex; gap: 10px; align-items: center; }
        .btn { 
            padding: 10px 18px; border-radius: 25px; border: none; cursor: pointer; 
            display: flex; align-items: center; gap: 8px; font-weight: 500; font-size: 14px;
        }
        .like-btn { background: #f2f2f2; }
        .like-btn.liked { background: #e0e0e0; cursor: not-allowed; opacity: 0.7; }
        .download-btn { background: #3ecf8e; color: white; text-decoration: none; }

        /* Grid Section */
        .video-grid { padding: 15px; display: grid; grid-template-columns: 1fr; gap: 15px; box-sizing: border-box; }
        
        @media (min-width: 768px) {
            .main-container { flex-direction: row; padding: 20px; gap: 25px; max-width: 1200px; margin: 0 auto; }
            .player-section { flex: 2; }
            .video-grid { flex: 1; grid-template-columns: 1fr; padding: 0; }
            header { padding: 10px 50px; }
        }

        .card { cursor: pointer; display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .card video { border-radius: 12px; width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-info h4 { margin: 0; font-size: 15px; }
    </style>
</head>
<body>

<header>
    <div style="color:red; font-weight:bold; font-size:18px; cursor:pointer;" onclick="location.reload()">MyTube</div>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="সার্চ করুন...">
        <button onclick="searchVideos()">🔍</button>
    </div>
</header>

<div class="main-container">
    <div class="player-section" id="playerSection">
        <video id="mainPlayer" controls autoplay></video>
        <div class="video-details">
            <h3 id="playingTitle">লোডিং...</h3>
            <div class="action-buttons">
                <button class="btn like-btn" id="likeBtn" onclick="handleLike()">
                    👍 <span id="likeCount">0</span>
                </button>
                <a id="downloadLink" href="#" download class="btn download-btn">⬇️ ডাউনলোড</a>
            </div>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <h4 style="margin: 0 0 15px 0;">পরবর্তী ভিডিও</h4>
            <div id="sidebarVideos" class="video-grid" style="padding: 0;"></div>
        </div>
    </div>

    <div class="video-grid" id="videoGrid">
        <p>ভিডিও লোড হচ্ছে...</p>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://zlzpfnhnfhtanuvaskjy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allVideos = [];
    let currentVideoId = null;

    async function loadVideos() {
        const { data, error } = await _supabase.from('video_list').select('*').order('created_at', { ascending: false });
        if (error) return;
        allVideos = data;
        displayVideos(data);
    }

    function displayVideos(videos) {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = "";
        videos.forEach(v => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => playVideo(v);
            card.innerHTML = `
                <video src="${v.url}" muted></video>
                <div class="card-info">
                    <h4>${v.title}</h4>
                    <small style="color:#606060">${v.likes || 0} লাইক</small>
                </div>`;
            grid.appendChild(card);
        });
    }

    function playVideo(video) {
        currentVideoId = video.id;
        document.getElementById('playerSection').style.display = 'block';
        document.getElementById('videoGrid').style.display = window.innerWidth < 768 ? 'none' : 'grid';
        
        const player = document.getElementById('mainPlayer');
        player.src = video.url;
        player.play();
        
        document.getElementById('playingTitle').innerText = video.title;
        document.getElementById('likeCount').innerText = video.likes || 0;
        document.getElementById('downloadLink').href = video.url;

        // চেক করা ইউজার আগে লাইক দিয়েছে কি না
        const likedVideos = JSON.parse(localStorage.getItem('likedVideos') || '[]');
        const likeBtn = document.getElementById('likeBtn');
        if (likedVideos.includes(video.id)) {
            likeBtn.classList.add('liked');
            likeBtn.disabled = true;
        } else {
            likeBtn.classList.remove('liked');
            likeBtn.disabled = false;
        }
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
        showSidebarVideos(video.id);
    }

    function showSidebarVideos(excludeId) {
        const sidebar = document.getElementById('sidebarVideos');
        sidebar.innerHTML = "";
        allVideos.filter(v => v.id !== excludeId).forEach(v => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.flexDirection = 'row';
            div.onclick = () => playVideo(v);
            div.innerHTML = `
                <video src="${v.url}" style="width: 120px; height: 70px;"></video>
                <div class="card-info">
                    <h4 style="font-size: 13px;">${v.title}</h4>
                </div>`;
            sidebar.appendChild(div);
        });
    }

    async function handleLike() {
        if (!currentVideoId) return;

        let likedVideos = JSON.parse(localStorage.getItem('likedVideos') || '[]');
        if (likedVideos.includes(currentVideoId)) return;

        const likeSpan = document.getElementById('likeCount');
        let newLikes = parseInt(likeSpan.innerText) + 1;
        likeSpan.innerText = newLikes;

        const { error } = await _supabase.from('video_list').update({ likes: newLikes }).eq('id', currentVideoId);

        if (!error) {
            likedVideos.push(currentVideoId);
            localStorage.setItem('likedVideos', JSON.stringify(likedVideos));
            const btn = document.getElementById('likeBtn');
            btn.classList.add('liked');
            btn.disabled = true;
        }
    }

    function searchVideos() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allVideos.filter(v => v.title.toLowerCase().includes(term));
        displayVideos(filtered);
    }

    loadVideos();
</script>
</body>
</html>
