<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery - Mobile Responsive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; margin: 0; background: #fff; color: #0f0f0f; }
        
        /* Header & Search Bar */
        header { 
            background: #fff; padding: 10px 15px; display: flex; align-items: center; 
            justify-content: space-between; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; 
        }
        .search-bar { flex: 1; margin: 0 15px; display: flex; max-width: 600px; }
        .search-bar input { width: 100%; padding: 8px 15px; border: 1px solid #ccc; border-radius: 20px 0 0 20px; outline: none; }
        .search-bar button { padding: 8px 15px; border: 1px solid #ccc; border-left: none; border-radius: 0 20px 20px 0; cursor: pointer; background: #f8f8f8; }

        /* Main Layout */
        .main-container { display: flex; flex-direction: column; padding: 0; }
        
        /* Video Player Section */
        .player-section { width: 100%; display: none; background: #fff; margin-bottom: 20px; }
        .player-wrapper { width: 100%; position: relative; background: #000; }
        video { width: 100%; aspect-ratio: 16 / 9; }
        
        .video-details { padding: 15px; border-bottom: 1px solid #eee; }
        .video-details h3 { margin: 0 0 10px 0; font-size: 18px; }
        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .btn { 
            padding: 8px 16px; border-radius: 20px; border: none; cursor: pointer; 
            display: flex; align-items: center; gap: 5px; font-weight: 500; background: #f2f2f2;
        }
        .btn:hover { background: #e5e5e5; }
        .like-btn.active { background: #333; color: #fff; }
        .download-btn { background: #3ecf8e; color: white; text-decoration: none; font-size: 14px; }

        /* Video Grid */
        .video-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); 
            gap: 15px; padding: 15px; 
        }

        /* Responsive Breakpoints */
        @media (min-width: 768px) {
            .video-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
            .main-container { flex-direction: row; padding: 20px; gap: 20px; max-width: 1300px; margin: 0 auto; }
            .player-section { flex: 2; border-radius: 12px; overflow: hidden; }
            .video-grid { flex: 1; padding: 0; }
        }

        .card { cursor: pointer; margin-bottom: 10px; }
        .card img, .card video { width: 100%; border-radius: 12px; object-fit: cover; aspect-ratio: 16/9; background: #eee; }
        .card-info { padding: 10px 5px; }
        .card-info h4 { margin: 0; font-size: 14px; line-height: 1.4; }
    </style>
</head>
<body>

<header>
    <div style="color:red; font-weight:bold; font-size:20px; cursor:pointer;" onclick="location.reload()">MyTube</div>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="সার্চ করুন...">
        <button onclick="searchVideos()">🔍</button>
    </div>
</header>

<div class="main-container">
    <div class="player-section" id="playerSection">
        <div class="player-wrapper">
            <video id="mainPlayer" controls autoplay></video>
        </div>
        <div class="video-details">
            <h3 id="playingTitle">ভিডিও টাইটেল</h3>
            <div class="action-buttons">
                <button class="btn like-btn" id="likeBtn" onclick="handleLike()">
                    👍 <span id="likeCount">0</span>
                </button>
                <a id="downloadLink" href="#" download class="btn download-btn">⬇️ ডাউনলোড</a>
            </div>
        </div>
        <div style="padding: 15px;"><h4>পরবর্তী ভিডিও</h4></div>
    </div>

    <div class="video-grid" id="videoGrid">
        <p>ভিডিও লোড হচ্ছে...</p>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://zlzpfnhnfhtanuvaskjy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allVideos = [];
    let currentVideoId = null;

    async function loadVideos() {
        const { data, error } = await _supabase.from('video_list').select('*').order('created_at', { ascending: false });
        if (error) return console.error(error);
        allVideos = data;
        displayVideos(data);
    }

    function displayVideos(videos) {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = "";
        videos.forEach(v => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => playVideo(v);
            card.innerHTML = `
                <video src="${v.url}" muted></video>
                <div class="card-info">
                    <h4>${v.title}</h4>
                    <small style="color:#666">${v.likes || 0} লাইক</small>
                </div>`;
            grid.appendChild(card);
        });
    }

    function playVideo(video) {
        currentVideoId = video.id;
        document.getElementById('playerSection').style.display = 'block';
        const player = document.getElementById('mainPlayer');
        player.src = video.url;
        player.play();
        
        document.getElementById('playingTitle').innerText = video.title;
        document.getElementById('likeCount').innerText = video.likes || 0;
        document.getElementById('downloadLink').href = video.url;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function handleLike() {
        if (!currentVideoId) return;

        // UI-তে তৎক্ষণাৎ ১ বাড়িয়ে দেখানো (Optimistic UI)
        const likeSpan = document.getElementById('likeCount');
        let currentLikes = parseInt(likeSpan.innerText);
        likeSpan.innerText = currentLikes + 1;

        // ডাটাবেস আপডেট করা
        const { data, error } = await _supabase
            .from('video_list')
            .update({ likes: currentLikes + 1 })
            .eq('id', currentVideoId)
            .select();

        if (error) {
            alert("লাইক সেভ করা যায়নি!");
            likeSpan.innerText = currentLikes; // এরর হলে আগের অবস্থায় ফেরত নেওয়া
        }
    }

    function searchVideos() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allVideos.filter(v => v.title.toLowerCase().includes(term));
        displayVideos(filtered);
    }

    loadVideos();
</script>
</body>
</html>
