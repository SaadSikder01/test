<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube - Professional Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Roboto', Arial, sans-serif; margin: 0; background: #fff; color: #0f0f0f; }
        
        /* Header */
        header { position: sticky; top: 0; background: white; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid #eee; }
        .logo { color: #f00; font-size: 22px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .search-area { flex: 0 1 600px; display: flex; margin: 0 20px; }
        .search-area input { width: 100%; padding: 8px 15px; border: 1px solid #ccc; border-radius: 20px 0 0 20px; outline: none; }
        .search-area button { padding: 8px 20px; border: 1px solid #ccc; border-left: none; border-radius: 0 20px 20px 0; cursor: pointer; background: #f8f8f8; }

        /* Main Layout */
        .page-container { display: flex; flex-direction: column; max-width: 1400px; margin: 0 auto; padding: 0; }
        .main-content { flex: 3; padding: 10px; }
        .sidebar-content { flex: 1.2; padding: 10px; }

        /* Player Section */
        #playerSection { display: none; margin-bottom: 20px; }
        .video-box { width: 100%; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        video { width: 100%; display: block; aspect-ratio: 16/9; }

        /* Info & Buttons */
        .video-info { padding: 15px 0; border-bottom: 1px solid #eee; }
        .video-info h2 { font-size: 20px; margin: 0 0 10px 0; }
        .action-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; border-radius: 20px; border: none; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 8px; background: #f2f2f2; }
        .btn-down { background: #3ecf8e; color: white; }

        /* Video List (Right Side on Desktop) */
        .video-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .v-card { display: flex; gap: 12px; cursor: pointer; text-decoration: none; color: inherit; }
        .v-card video { width: 168px; height: 94px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: #000; }
        .v-card .v-info h4 { margin: 0; font-size: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-card .v-info small { color: #606060; font-size: 12px; }

        /* YouTube Desktop Layout (1000px এর উপরে) */
        @media (min-width: 1000px) {
            .page-container { flex-direction: row; padding: 20px 40px; gap: 24px; }
            .main-content { padding: 0; }
            .sidebar-content { padding: 0; }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .search-area { display: none; }
            .v-card video { width: 120px; height: 68px; }
        }
    </style>
</head>
<body>

<header>
    <a href="view.html" class="logo">MyTube</a>
    <div class="search-area">
        <input type="text" id="searchInput" placeholder="সার্চ করুন...">
        <button onclick="searchVideos()">🔍</button>
    </div>
    <div style="width:40px"></div>
</header>

<div class="page-container">
    <div class="main-content">
        <div id="playerSection">
            <div class="video-box">
                <video id="mainPlayer" controls playsinline preload="auto">
                    <source id="videoSource" type="video/mp4">
                    আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
                </video>
            </div>
            <div class="video-info">
                <h2 id="videoTitle">ভিডিও টাইটেল</h2>
                <div class="action-row">
                    <button class="btn" id="likeBtn" onclick="handleLike()">
                        👍 <span id="likeCount">0</span>
                    </button>
                    <button class="btn btn-down" id="downBtn" onclick="downloadVideo()">⬇️ ডাউনলোড</button>
                    <a id="fallbackLink" style="display:none; color:blue; font-size:12px;">ডাউনলোড না হলে এখানে চাপুন</a>
                </div>
            </div>
        </div>
        
        <div style="margin-top:20px"><h4 id="nextText" style="display:none">পরবর্তী ভিডিও</h4></div>
    </div>

    <div class="sidebar-content">
        <div class="video-grid" id="videoGrid">
            <p>ভিডিও লোড হচ্ছে...</p>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://zlzpfnhnfhtanuvaskjy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allVideos = [];
    let currentVideo = null;

    async function loadVideos() {
        const { data, error } = await _supabase.from('video_list').select('*').order('created_at', { ascending: false });
        if (error) return;
        allVideos = data;
        renderList(data);
    }

    function renderList(list) {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = "";
        list.forEach(v => {
            const card = document.createElement('div');
            card.className = 'v-card';
            card.onclick = () => playVideo(v);
            card.innerHTML = `
                <video src="${v.url}#t=0.5" muted playsinline></video>
                <div class="v-info">
                    <h4>${v.title || 'শিরোনাম নেই'}</h4>
                    <small>${v.likes || 0} লাইক</small>
                </div>`;
            grid.appendChild(card);
        });
    }

    function playVideo(video) {
        currentVideo = video;
        const playerSection = document.getElementById('playerSection');
        const player = document.getElementById('mainPlayer');
        const source = document.getElementById('videoSource');

        playerSection.style.display = 'block';
        document.getElementById('nextText').style.display = 'block';

        // মোবাইল ফিক্স: সরাসরি src পরিবর্তন না করে source ব্যবহার করে load() কল করা
        source.src = video.url;
        player.load(); 

        // ব্রাউজার যদি অটো-প্লে ব্লক করে তবে এরর দেখাবে না
        player.play().catch(e => console.log("অটো-প্লে বা লোডিং সমস্যা। দয়া করে প্লে বাটনে চাপ দিন।"));

        document.getElementById('videoTitle').innerText = video.title || 'শিরোনাম নেই';
        document.getElementById('likeCount').innerText = video.likes || 0;

        // লাইক চেক
        const liked = JSON.parse(localStorage.getItem('liked_list') || '[]');
        const btn = document.getElementById('likeBtn');
        btn.disabled = liked.includes(video.id);
        btn.style.opacity = btn.disabled ? "0.5" : "1";

        if (window.innerWidth < 1000) window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function handleLike() {
        if (!currentVideo) return;
        const liked = JSON.parse(localStorage.getItem('liked_list') || '[]');
        if (liked.includes(currentVideo.id)) return;

        const { error } = await _supabase.rpc('increment_likes', { row_id: currentVideo.id }); 
        // যদি rpc কাজ না করে তবে নিচের সহজ মেথড:
        const newLikes = (currentVideo.likes || 0) + 1;
        await _supabase.from('video_list').update({ likes: newLikes }).eq('id', currentVideo.id);

        document.getElementById('likeCount').innerText = newLikes;
        liked.push(currentVideo.id);
        localStorage.setItem('liked_list', JSON.stringify(liked));
        document.getElementById('likeBtn').disabled = true;
        document.getElementById('likeBtn').style.opacity = "0.5";
    }

    async function downloadVideo() {
        if (!currentVideo) return;
        const btn = document.getElementById('downBtn');
        const fallback = document.getElementById('fallbackLink');
        btn.innerText = "প্রসেসিং...";
        btn.disabled = true;

        try {
            const response = await fetch(currentVideo.url);
            if (!response.ok) throw new Error("CORS Error");
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentVideo.title || 'video'}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            btn.innerText = "⬇️ ডাউনলোড";
        } catch (e) {
            // যদি CORS এর কারণে আটকে যায় তবে সরাসরি লিঙ্কে নিয়ে যাবে
            btn.innerText = "ব্যর্থ হয়েছে!";
            fallback.href = currentVideo.url;
            fallback.style.display = "block";
            fallback.innerText = "সরাসরি ডাউনলোড করতে এখানে ক্লিক করুন (নতুন ট্যাব)";
            fallback.target = "_blank";
        } finally {
            btn.disabled = false;
        }
    }

    function searchVideos() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        renderList(allVideos.filter(v => (v.title || '').toLowerCase().includes(q)));
    }

    loadVideos();
</script>
</body>
</html>
