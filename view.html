<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Video Gallery - YouTube Style</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; }
        header { background: #fff; padding: 10px 50px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .search-bar { width: 50%; display: flex; }
        .search-bar input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 20px 0 0 20px; outline: none; }
        .search-bar button { padding: 8px 20px; border: 1px solid #ccc; border-left: none; border-radius: 0 20px 20px 0; cursor: pointer; }
        
        .main-layout { display: flex; padding: 20px; gap: 20px; flex-wrap: wrap; }
        .video-player-section { flex: 2; min-width: 600px; display: none; }
        .video-list-section { flex: 1; min-width: 300px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        
        .player-box video { width: 100%; background: #000; border-radius: 12px; }
        .card { cursor: pointer; transition: 0.3s; }
        .card video { width: 100%; border-radius: 10px; pointer-events: none; }
        .card-info h4 { margin: 10px 0 5px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { padding: 8px 15px; border-radius: 20px; border: none; cursor: pointer; font-size: 14px; }
        .like-btn { background: #f2f2f2; }
        .down-btn { background: #3ecf8e; color: white; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

<header>
    <h2 style="color:red">MyTube</h2>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="ভিডিও খুঁজুন...">
        <button onclick="searchVideos()">🔍</button>
    </div>
</header>

<div class="main-layout">
    <div class="video-player-section" id="playerSection">
        <div class="player-box">
            <video id="mainPlayer" controls autoplay></video>
            <h3 id="playingTitle">ভিডিওর টাইটেল</h3>
            <div class="btn-group">
                <button class="btn like-btn" onclick="likeVideo()">👍 Like</button>
                <a id="downloadLink" href="#" download class="btn down-btn">⬇️ Download</a>
            </div>
        </div>
        <hr>
        <h4>আরো দেখুন</h4>
        <div id="randomList"></div>
    </div>

    <div class="video-list-section" id="videoGrid"></div>
</div>

<script>
    const SUPABASE_URL = "https://zlzpfnhnfhtanuvaskjy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allVideos = [];

    async function loadVideos() {
        const { data } = await _supabase.from('video_list').select('*').order('created_at', { ascending: false });
        allVideos = data;
        displayVideos(data);
    }

    function displayVideos(videos) {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = "";
        videos.forEach(v => {
            grid.innerHTML += `
                <div class="card" onclick="playVideo('${v.url}', '${v.title}')">
                    <video src="${v.url}"></video>
                    <div class="card-info">
                        <h4>${v.title}</h4>
                        <small>Uploaded: ${new Date(v.created_at).toLocaleDateString()}</small>
                    </div>
                </div>`;
        });
    }

    function playVideo(url, title) {
        document.getElementById('playerSection').style.display = 'block';
        document.getElementById('mainPlayer').src = url;
        document.getElementById('playingTitle').innerText = title;
        document.getElementById('downloadLink').href = url;
        window.scrollTo(0,0);
        
        // র‌্যান্ডম লিস্ট দেখানো
        const randomList = document.getElementById('randomList');
        randomList.innerHTML = "";
        allVideos.slice(0, 5).forEach(rv => {
            if(rv.url !== url) {
                randomList.innerHTML += `<p style="cursor:pointer; color:blue" onclick="playVideo('${rv.url}', '${rv.title}')">${rv.title}</p>`;
            }
        });
    }

    function searchVideos() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allVideos.filter(v => v.title.toLowerCase().includes(term));
        displayVideos(filtered);
    }

    loadVideos();
</script>
</body>
</html>
