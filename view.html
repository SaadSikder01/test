<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube - Professional Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --yt-red: #f00; --bg-color: #fff; --text-color: #0f0f0f; }
        body { font-family: 'Roboto', Arial, sans-serif; margin: 0; background: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        
        header { 
            position: sticky; top: 0; background: white; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 10px; border-bottom: 1px solid #eee; gap: 10px;
        }
        .header-top { display: flex; width: 100%; justify-content: space-between; align-items: center; max-width: 1300px; }
        .logo { color: var(--yt-red); font-size: 22px; font-weight: bold; cursor: pointer; text-decoration: none; }
        
        .search-area { display: flex; width: 100%; max-width: 600px; }
        .search-area input { flex: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 20px 0 0 20px; outline: none; font-size: 14px; }
        .search-area button { padding: 10px 18px; border: 1px solid #ccc; border-left: none; border-radius: 0 20px 20px 0; cursor: pointer; background: #f8f8f8; }

        .page-container { display: flex; flex-direction: column; width: 100%; box-sizing: border-box; }

        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; padding: 15px;
        }

        .v-card { cursor: pointer; display: flex; flex-direction: column; gap: 8px; }
        .v-card .thumb-box { width: 100%; aspect-ratio: 16/9; border-radius: 12px; background: #ddd; overflow: hidden; position: relative; }
        /* থাম্বনেইল ইমেজের জন্য স্টাইল */
        .v-card img { width: 100%; height: 100%; object-fit: cover; }
        .v-card video { width: 100%; height: 100%; object-fit: cover; }
        .v-info h4 { margin: 0; font-size: 15px; line-height: 1.4; }

        #playerSection { display: none; width: 100%; margin-bottom: 20px; }
        .video-box { width: 100%; background: #000; overflow: hidden; }
        video#mainPlayer { width: 100%; aspect-ratio: 16/9; display: block; background: #000; }
        
        .video-details { padding: 15px; }
        .action-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px 20px; border-radius: 20px; border: none; font-weight: 500; cursor: pointer; background: #f2f2f2; text-decoration: none; color: #000; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .btn-down { background: #3ecf8e; color: white; }

        @media (min-width: 1000px) {
            header { flex-direction: row; padding: 10px 5%; }
            .search-area { margin: 0 20px; }
            .watch-mode { flex-direction: row; padding: 20px 5%; gap: 24px; }
            .watch-mode .main-content { flex: 2.5; }
            .watch-mode .sidebar-content { flex: 1; }
            .watch-mode .video-grid { grid-template-columns: 1fr; padding: 0; }
            .watch-mode .v-card { flex-direction: row; }
            .watch-mode .v-card .thumb-box { width: 160px; height: 90px; }
        }

        @media (max-width: 600px) {
            .video-grid { grid-template-columns: 1fr; padding: 10px; }
            .v-card .thumb-box { border-radius: 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <a href="view.html" class="logo">MyTube</a>
    </div>
    <div class="search-area">
        <input type="text" id="searchInput" placeholder="সার্চ করুন...">
        <button onclick="searchVideos()">🔍</button>
    </div>
</header>

<div class="page-container" id="mainLayout">
    <div class="main-content">
        <div id="playerSection">
            <div class="video-box">
                <video id="mainPlayer" controls playsinline preload="auto" poster=""></video>
            </div>
            <div class="video-details">
                <h2 id="videoTitle" style="font-size: 18px; margin:0;">লোডিং...</h2>
                <div class="action-row">
                    <button class="btn" id="likeBtn" onclick="handleLike()">👍 <span id="likeCount">0</span></button>
                    <a id="downloadBtn" class="btn btn-down" href="#" download>⬇️ ডাউনলোড</a>
                </div>
            </div>
            <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
            <h4 style="padding: 0 15px;">পরবর্তী ভিডিও</h4>
        </div>
    </div>

    <div class="sidebar-content">
        <div class="video-grid" id="videoGrid">
            <p style="padding:20px;">ভিডিও লোড হচ্ছে...</p>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://zlzpfnhnfhtanuvaskjy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allVideos = [];
    let currentVideo = null;

    async function init() {
        const { data, error } = await _supabase.from('video_list').select('*').order('created_at', { ascending: false });
        if (!error) {
            allVideos = data;
            render(data);
        }
    }

    function render(list) {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = "";
        list.forEach(v => {
            const card = document.createElement('div');
            card.className = 'v-card';
            card.onclick = () => play(v);
            
            // থাম্বনেইল থাকলে ইমেজ দেখাবে, নাহলে ভিডিওর প্রিভিউ দেখাবে
            let previewHTML = "";
            if (v.thumbnail) {
                previewHTML = `<img src="${v.thumbnail}" loading="lazy" alt="thumbnail">`;
            } else {
                previewHTML = `<video src="${v.url}#t=1" muted playsinline preload="none"></video>`;
            }

            card.innerHTML = `
                <div class="thumb-box">
                    ${previewHTML}
                </div>
                <div class="v-info">
                    <h4>${v.title}</h4>
                    <small>${v.likes || 0} লাইক</small>
                </div>`;
            grid.appendChild(card);
        });
    }

    function play(video) {
        currentVideo = video;
        const player = document.getElementById('mainPlayer');
        const layout = document.getElementById('mainLayout');
        
        document.getElementById('playerSection').style.display = 'block';
        layout.classList.add('watch-mode');

        // ভিডিওর ব্রোকেন আইকন সরাতে পোস্টার সেট করা
        if (video.thumbnail) {
            player.poster = video.thumbnail;
        } else {
            player.removeAttribute('poster');
        }

        player.pause();
        player.removeAttribute('src'); 
        player.load();

        setTimeout(() => {
            player.src = video.url;
            player.load();
        }, 100);

        document.getElementById('videoTitle').innerText = video.title;
        document.getElementById('likeCount').innerText = video.likes || 0;
        
        const dBtn = document.getElementById('downloadBtn');
        dBtn.href = video.url;
        dBtn.setAttribute('download', `${video.title}.mp4`);

        updateLikeUI(video.id);
        if (window.innerWidth < 1000) window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateLikeUI(id) {
        const liked = JSON.parse(localStorage.getItem('my_likes') || '[]');
        const lBtn = document.getElementById('likeBtn');
        lBtn.disabled = liked.includes(id);
        lBtn.style.opacity = lBtn.disabled ? "0.5" : "1";
    }

    async function handleLike() {
        if (!currentVideo) return;
        const liked = JSON.parse(localStorage.getItem('my_likes') || '[]');
        if (liked.includes(currentVideo.id)) return;

        const newLikes = (currentVideo.likes || 0) + 1;
        await _supabase.from('video_list').update({ likes: newLikes }).eq('id', currentVideo.id);

        document.getElementById('likeCount').innerText = newLikes;
        liked.push(currentVideo.id);
        localStorage.setItem('my_likes', JSON.stringify(liked));
        currentVideo.likes = newLikes;
        updateLikeUI(currentVideo.id);
    }

    function searchVideos() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        render(allVideos.filter(v => v.title.toLowerCase().includes(q)));
    }

    init();
</script>
</body>
</html>
