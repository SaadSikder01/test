<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube - Pro Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; }
        header { padding: 10px 20px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 100; }
        .search-container { flex: 1; display: flex; margin-left: 20px; }
        .search-container input { width: 100%; max-width: 400px; padding: 8px; border: 1px solid #ccc; border-radius: 20px 0 0 20px; outline: none; }
        .search-container button { padding: 8px 15px; border: 1px solid #ccc; border-left: none; border-radius: 0 20px 20px 0; cursor: pointer; }

        .container { display: flex; flex-direction: column; padding: 0; }
        
        /* Player Styles */
        .player-section { width: 100%; display: none; }
        video { width: 100%; background: #000; aspect-ratio: 16/9; }
        .info { padding: 15px; }
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn { padding: 10px 18px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .like-btn { background: #f2f2f2; }
        .like-btn.liked { background: #e0e0e0; cursor: not-allowed; opacity: 0.7; }
        .down-btn { background: #3ecf8e; color: white; }

        /* Grid Styles */
        .video-grid { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); gap: 15px; }
        .card { cursor: pointer; }
        .card video { width: 100%; border-radius: 12px; aspect-ratio: 16/9; object-fit: cover; }
        
        @media (min-width: 900px) {
            .container { flex-direction: row; padding: 20px; gap: 20px; }
            .player-section { flex: 2; }
            .video-grid { flex: 1; grid-template-columns: 1fr; padding: 0; }
        }
    </style>
</head>
<body>

<header>
    <div style="color:red; font-weight:bold; font-size:22px; cursor:pointer;" onclick="location.reload()">MyTube</div>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="সার্চ করুন...">
        <button onclick="searchVideos()">🔍</button>
    </div>
</header>

<div class="container">
    <div class="player-section" id="playerSection">
        <video id="mainPlayer" controls playsinline preload="metadata"></video>
        <div class="info">
            <h2 id="videoTitle" style="margin:0">টাইটেল</h2>
            <div class="actions">
                <button class="btn like-btn" id="likeBtn" onclick="handleLike()">
                    👍 <span id="likeCount">0</span>
                </button>
                <button class="btn down-btn" onclick="directDownload()">⬇️ ডাউনলোড</button>
            </div>
            <hr>
            <h4>পরবর্তী ভিডিও</h4>
            <div id="nextVideos"></div>
        </div>
    </div>

    <div class="video-grid" id="videoGrid"></div>
</div>

<script>
    const SUPABASE_URL = "https://zlzpfnhnfhtanuvaskjy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allVideos = [];
    let currentVideo = null;

    async function getVideos() {
        const { data } = await _supabase.from('video_list').select('*').order('created_at', { ascending: false });
        allVideos = data || [];
        renderGrid(allVideos);
    }

    function renderGrid(list) {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = list.length ? "" : "কোনো ভিডিও নেই।";
        list.forEach(v => {
            const div = document.createElement('div');
            div.className = 'card';
            div.onclick = () => playThis(v);
            div.innerHTML = `<video src="${v.url}#t=0.5" muted playsinline></video><h4>${v.title}</h4>`;
            grid.appendChild(div);
        });
    }

    function playThis(v) {
        currentVideo = v;
        document.getElementById('playerSection').style.display = 'block';
        const player = document.getElementById('mainPlayer');
        player.src = v.url;
        player.play().catch(e => console.log("Auto-play blocked"));
        
        document.getElementById('videoTitle').innerText = v.title;
        document.getElementById('likeCount').innerText = v.likes || 0;
        
        // লাইক চেক
        const likedVideos = JSON.parse(localStorage.getItem('likedVideos') || '[]');
        const btn = document.getElementById('likeBtn');
        if(likedVideos.includes(v.id)) {
            btn.classList.add('liked');
            btn.disabled = true;
        } else {
            btn.classList.remove('liked');
            btn.disabled = false;
        }

        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function handleLike() {
        if(!currentVideo) return;
        const likedVideos = JSON.parse(localStorage.getItem('likedVideos') || '[]');
        
        if(likedVideos.includes(currentVideo.id)) return;

        const newLikes = (currentVideo.likes || 0) + 1;
        const { error } = await _supabase.from('video_list').update({ likes: newLikes }).eq('id', currentVideo.id);
        
        if(!error) {
            document.getElementById('likeCount').innerText = newLikes;
            likedVideos.push(currentVideo.id);
            localStorage.setItem('likedVideos', JSON.stringify(likedVideos));
            const btn = document.getElementById('likeBtn');
            btn.classList.add('liked');
            btn.disabled = true;
        }
    }

    async function directDownload() {
        if(!currentVideo) return;
        const status = document.querySelector('.down-btn');
        status.innerText = "প্রসেসিং...";
        
        try {
            const response = await fetch(currentVideo.url);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentVideo.title}.mp4`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            status.innerText = "⬇️ ডাউনলোড";
        } catch (e) {
            alert("ডাউনলোড করতে সমস্যা হয়েছে।");
            status.innerText = "⬇️ ডাউনলোড";
        }
    }

    function searchVideos() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        renderGrid(allVideos.filter(v => v.title.toLowerCase().includes(q)));
    }

    getVideos();
</script>
</body>
</html>
