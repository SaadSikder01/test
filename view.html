<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube - Professional Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Roboto', Arial, sans-serif; margin: 0; background: #fff; color: #0f0f0f; }
        
        /* Header */
        header { 
            position: sticky; top: 0; background: white; z-index: 1000; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 20px; border-bottom: 1px solid #eee; 
        }
        .logo { color: #f00; font-size: 22px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .search-area { flex: 0 1 600px; display: flex; margin: 0 20px; }
        .search-area input { width: 100%; padding: 8px 15px; border: 1px solid #ccc; border-radius: 20px 0 0 20px; outline: none; }
        .search-area button { padding: 8px 20px; border: 1px solid #ccc; border-left: none; border-radius: 0 20px 20px 0; cursor: pointer; background: #f8f8f8; }

        /* Container & Layout */
        .page-container { display: flex; flex-direction: column; max-width: 100%; margin: 0 auto; }
        
        /* Mobile UI (ডিফল্ট) */
        .main-content { padding: 10px; }
        .sidebar-content { padding: 10px; }

        /* Video Player */
        #playerSection { display: none; margin-bottom: 20px; }
        .video-box { width: 100%; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        video { width: 100%; display: block; aspect-ratio: 16/9; }

        /* Info & Buttons */
        .video-info { padding: 15px 0; border-bottom: 1px solid #eee; }
        .video-info h2 { font-size: 19px; margin: 0 0 10px 0; font-weight: 500; }
        .action-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        
        .btn { 
            padding: 10px 18px; border-radius: 20px; border: none; cursor: pointer; 
            font-weight: 500; display: flex; align-items: center; gap: 8px; background: #f2f2f2;
        }
        .btn-down { background: #3ecf8e; color: white; text-decoration: none; font-size: 14px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Video Grid/List */
        .video-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .v-card { display: flex; gap: 12px; cursor: pointer; text-decoration: none; color: inherit; }
        .v-card video { width: 160px; height: 90px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: #eee; }
        .v-card .v-info h4 { margin: 0; font-size: 14px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-card .v-info small { color: #606060; font-size: 12px; display: block; margin-top: 4px; }

        /* Desktop UI (YouTube Style - 1000px এর উপরে) */
        @media (min-width: 1000px) {
            .page-container { flex-direction: row; padding: 20px 5%; gap: 24px; max-width: 1300px; }
            .main-content { flex: 2.5; padding: 0; }
            .sidebar-content { flex: 1; padding: 0; }
            .v-card video { width: 168px; height: 94px; }
        }

        /* Mobile Adjustments (Header hiding) */
        @media (max-width: 600px) {
            .search-area { display: none; }
            header { padding: 10px; }
            .v-card video { width: 120px; height: 68px; }
        }
    </style>
</head>
<body>

<header>
    <a href="view.html" class="logo">MyTube</a>
    <div class="search-area">
        <input type="text" id="searchInput" placeholder="সার্চ করুন...">
        <button onclick="searchVideos()">🔍</button>
    </div>
    <div style="width:40px"></div>
</header>

<div class="page-container">
    <div class="main-content">
        <div id="playerSection">
            <div class="video-box">
                <video id="mainPlayer" controls playsinline preload="auto"></video>
            </div>
            <div class="video-info">
                <h2 id="videoTitle">লোডিং...</h2>
                <div class="action-row">
                    <button class="btn" id="likeBtn" onclick="handleLike()">
                        👍 <span id="likeCount">0</span>
                    </button>
                    <a id="mobileDownBtn" class="btn btn-down" href="#" download>⬇️ ডাউনলোড করুন</a>
                </div>
            </div>
            <div style="margin-top: 20px;"><h4>পরবর্তী ভিডিও</h4></div>
        </div>
    </div>

    <div class="sidebar-content">
        <div class="video-grid" id="videoGrid">
            <p>ভিডিও লোড হচ্ছে...</p>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://zlzpfnhnfhtanuvaskjy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allVideos = [];
    let currentVideo = null;

    async function loadData() {
        const { data, error } = await _supabase.from('video_list').select('*').order('created_at', { ascending: false });
        if (!error) {
            allVideos = data;
            render(data);
        }
    }

    function render(list) {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = list.length ? "" : "কোনো ভিডিও পাওয়া যায়নি।";
        list.forEach(v => {
            const card = document.createElement('div');
            card.className = 'v-card';
            card.onclick = () => play(v);
            card.innerHTML = `
                <video src="${v.url}#t=0.5" muted playsinline></video>
                <div class="v-info">
                    <h4>${v.title}</h4>
                    <small>${v.likes || 0} লাইক</small>
                </div>`;
            grid.appendChild(card);
        });
    }

    function play(video) {
        currentVideo = video;
        document.getElementById('playerSection').style.display = 'block';
        const player = document.getElementById('mainPlayer');
        
        player.pause();
        player.src = video.url;
        player.load();
        player.play().catch(e => console.log("Manual play needed"));

        document.getElementById('videoTitle').innerText = video.title;
        document.getElementById('likeCount').innerText = video.likes || 0;

        // ডাউনলোড বাটন আপডেট (মোবাইল ও ডেক্সটপ উভয়ের জন্য নিরাপদ পদ্ধতি)
        const dBtn = document.getElementById('mobileDownBtn');
        dBtn.href = video.url; 
        // টাইটেল অনুযায়ী ফাইলের নাম সেট করা
        dBtn.setAttribute('download', `${video.title}.mp4`);

        // লাইক চেক
        const liked = JSON.parse(localStorage.getItem('liked_vids') || '[]');
        const lBtn = document.getElementById('likeBtn');
        lBtn.disabled = liked.includes(video.id);
        lBtn.style.opacity = lBtn.disabled ? "0.5" : "1";

        if (window.innerWidth < 1000) window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function handleLike() {
        if (!currentVideo) return;
        const liked = JSON.parse(localStorage.getItem('liked_vids') || '[]');
        if (liked.includes(currentVideo.id)) return;

        const newLikes = (currentVideo.likes || 0) + 1;
        const { error } = await _supabase.from('video_list').update({ likes: newLikes }).eq('id', currentVideo.id);

        if (!error) {
            document.getElementById('likeCount').innerText = newLikes;
            liked.push(currentVideo.id);
            localStorage.setItem('liked_vids', JSON.stringify(liked));
            document.getElementById('likeBtn').disabled = true;
            document.getElementById('likeBtn').style.opacity = "0.5";
            currentVideo.likes = newLikes;
        }
    }

    function searchVideos() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        render(allVideos.filter(v => v.title.toLowerCase().includes(q)));
    }

    loadData();
</script>
</body>
</html>
