<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নামের তালিকা</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 600px; }
        h2 { color: #333; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #28a745; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .refresh-btn { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 15px; }
        #loader { font-weight: bold; color: blue; }
    </style>
</head>
<body>

    <button class="refresh-btn" onclick="fetchList()">রিফ্রেশ করুন</button>
    
    <div class="container">
        <h2>শিটে থাকা নামের তালিকা</h2>
        <div id="loader">ডেটা লোড হচ্ছে...</div>
        <table id="dataTable" style="display:none;">
            <thead>
                <tr>
                    <th>নাম</th>
                    <th>তারিখ ও সময়</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzG06GIdetzqUmmWBbjF9RSpYQaDC3pGFMdI9pqsb1Vbr4cfIJ2v7Z4K9dtVKIXzIcv/exec";

        async function fetchList() {
            const loader = document.getElementById('loader');
            const table = document.getElementById('dataTable');
            const tableBody = document.getElementById('tableBody');

            loader.style.display = "block";
            table.style.display = "none";
            tableBody.innerHTML = "";

            try {
                const response = await fetch(scriptURL, {
                    method: "POST",
                    body: JSON.stringify({ action: "read" })
                });
                const data = await response.json();

                if (data.length === 0) {
                    loader.innerText = "শিটে কোনো ডেটা নেই!";
                } else {
                    data.forEach(row => {
                        const tr = document.createElement('tr');
                        // তারিখ ফরম্যাট সুন্দর করা
                        let dateStr = row[1] ? new Date(row[1]).toLocaleString('bn-BD') : "N/A";
                        tr.innerHTML = `<td>${row[0]}</td><td>${dateStr}</td>`;
                        tableBody.appendChild(tr);
                    });
                    loader.style.display = "none";
                    table.style.display = "table";
                }
            } catch (err) {
                loader.innerText = "ডেটা আনতে সমস্যা হয়েছে!";
                console.error(err);
            }
        }

        // পেজ লোড হলেই লিস্ট দেখাবে
        window.onload = fetchList;
    </script>
</body>
</html>
