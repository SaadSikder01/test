<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কার্টুন ভিডিও গ্যালারি</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        h1 {
            color: #333;
            font-size: 24px;
        }
        .back-link {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            transition: transform 0.2s;
            display: inline-block;
        }
        .back-link:hover {
            transform: scale(1.05);
        }
        .controls {
            background: white;
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box:focus {
            border-color: #667eea;
        }
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .video-count {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 20px;
            color: #666;
        }
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .video-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .video-wrapper {
            position: relative;
            background: #000;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        .video-info {
            padding: 15px;
        }
        .video-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .video-meta {
            font-size: 12px;
            color: #999;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }
        .delete-btn:hover {
            background: #c82333;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 20px;
        }
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .empty-state h3 {
            color: #333;
            margin-bottom: 10px;
        }
        .empty-state p {
            color: #666;
        }
        .loader {
            text-align: center;
            padding: 60px;
        }
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            .videos-grid {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 কার্টুন ভিডিও গ্যালারি</h1>
            <a href="index.html" class="back-link">➕ নতুন ভিডিও আপলোড</a>
        </header>
        
        <div class="controls">
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 ভিডিও সার্চ করুন...">
            <button class="refresh-btn" id="refreshBtn">🔄 রিফ্রেশ</button>
            <span class="video-count" id="videoCount">০টি ভিডিও</span>
        </div>
        
        <div class="videos-grid" id="videosGrid">
            <div class="loader">
                <div class="loader-spinner"></div>
                <p>ভিডিও লোড হচ্ছে...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zlzpfnhnfhtanuvaskjy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs';
        const BUCKET_NAME = 'naruto';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let allVideos = [];
        
        async function loadVideos() {
            const grid = document.getElementById('videosGrid');
            grid.innerHTML = '<div class="loader"><div class="loader-spinner"></div><p>ভিডিও লোড হচ্ছে...</p></div>';
            
            try {
                // প্রথমে স্টোরেজ থেকে সরাসরি ভিডিও লিস্টিং
                const { data: storageFiles, error: storageError } = await supabase.storage
                    .from(BUCKET_NAME)
                    .list('videos/');
                
                if (storageError) throw storageError;
                
                // ভিডিওগুলো প্রসেস করা
                const videos = [];
                if (storageFiles && storageFiles.length > 0) {
                    for (const file of storageFiles) {
                        if (file.name) {
                            const { data: urlData } = supabase.storage
                                .from(BUCKET_NAME)
                                .getPublicUrl(`videos/${file.name}`);
                            
                            videos.push({
                                id: file.id || file.name,
                                title: decodeURIComponent(file.name.replace(/^\d+_/, '').replace(/\.[^/.]+$/, '')),
                                url: urlData.publicUrl,
                                file_path: `videos/${file.name}`,
                                created_at: file.created_at || new Date(),
                                size: file.metadata?.size || 0
                            });
                        }
                    }
                }
                
                // ডাটাবেস থেকেও ভিডিও আনার চেষ্টা (যদি টেবিল থাকে)
                try {
                    const { data: dbVideos, error: dbError } = await supabase
                        .from('videos')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (!dbError && dbVideos && dbVideos.length > 0) {
                        // ডাটাবেসের ডাটা প্রাধান্য পাবে
                        allVideos = dbVideos;
                    } else {
                        allVideos = videos;
                    }
                } catch (e) {
                    allVideos = videos;
                }
                
                // তারিখ অনুযায়ী সাজানো (নতুন প্রথমে)
                allVideos.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                
                displayVideos(allVideos);
                
            } catch (error) {
                console.error('Error loading videos:', error);
                grid.innerHTML = `<div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <h3>ভিডিও লোড করতে সমস্যা হয়েছে</h3>
                    <p>${error.message}</p>
                </div>`;
            }
        }
        
        function displayVideos(videos) {
            const grid = document.getElementById('videosGrid');
            const videoCount = document.getElementById('videoCount');
            
            videoCount.textContent = `${videos.length}টি ভিডিও`;
            
            if (videos.length === 0) {
                grid.innerHTML = `<div class="empty-state">
                    <div class="empty-state-icon">🎬</div>
                    <h3>কোনো ভিডিও নেই</h3>
                    <p>প্রথমে একটি ভিডিও আপলোড করুন</p>
                    <a href="index.html" style="display: inline-block; margin-top: 15px; background: #667eea; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none;">➕ ভিডিও আপলোড করুন</a>
                </div>`;
                return;
            }
            
            grid.innerHTML = videos.map(video => `
                <div class="video-card" data-id="${video.id}">
                    <div class="video-wrapper">
                        <video controls preload="metadata">
                            <source src="${video.url}" type="video/mp4">
                            আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
                        </video>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(video.title || 'নামবিহীন ভিডিও')}</div>
                        <div class="video-meta">
                            <span>📅 ${formatDate(video.created_at)}</span>
                            <button class="delete-btn" onclick="deleteVideo('${video.id}', '${escapeHtml(video.file_path || video.url)}')">🗑️ ডিলিট</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatDate(dateString) {
            if (!dateString) return 'অজানা';
            const date = new Date(dateString);
            return `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`;
        }
        
        async function deleteVideo(videoId, filePath) {
            if (!confirm('ভিডিওটি ডিলিট করতে চান?')) return;
            
            try {
                // স্টোরেজ থেকে ডিলিট
                if (filePath && !filePath.startsWith('http')) {
                    const { error: storageError } = await supabase.storage
                        .from(BUCKET_NAME)
                        .remove([filePath]);
                    
                    if (storageError) console.error('Storage delete error:', storageError);
                }
                
                // ডাটাবেস থেকে ডিলিট (যদি টেবিল থাকে)
                try {
                    await supabase.from('videos').delete().eq('id', videoId);
                } catch (e) {
                    // টেবিল না থাকলে ইগনোর
                }
                
                // রিফ্রেশ
                loadVideos();
                showToast('ভিডিও ডিলিট করা হয়েছে');
                
            } catch (error) {
                console.error('Delete error:', error);
                alert('ডিলিট করতে সমস্যা হয়েছে');
            }
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.background = '#333';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '8px';
            toast.style.zIndex = '1000';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // সার্চ ফাংশন
        function searchVideos() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const filtered = allVideos.filter(video => 
                (video.title || '').toLowerCase().includes(searchTerm)
            );
            displayVideos(filtered);
        }
        
        document.getElementById('searchBox').addEventListener('input', searchVideos);
        document.getElementById('refreshBtn').addEventListener('click', loadVideos);
        
        loadVideos();
    </script>
</body>
</html>
