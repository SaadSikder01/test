<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Videos - Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .video-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 5px; }
        h2 { text-align: center; }
        .back-link { display: block; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<h2>সব ভিডিও গ্যালারি</h2>
<a href="index.html" class="back-link">← নতুন ভিডিও আপলোড করুন</a>

<div class="video-grid" id="videoContainer">
    <p style="text-align: center; width: 100%;">ভিডিও লোড হচ্ছে...</p>
</div>

<script>
    const SUPABASE_URL = "https://zlzpfnhnfhtanuvaskjy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs";
    
    // ভেরিয়েবল নাম পরিবর্তন করে _supabase দেওয়া হলো যাতে কনফ্লিক্ট না হয়
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadVideos() {
        const container = document.getElementById('videoContainer');

        try {
            const { data, error } = await _supabase
                .from('video_list')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (!data || data.length === 0) {
                container.innerHTML = "কোনো ভিডিও পাওয়া যায়নি। আগে আপলোড করুন।";
                return;
            }

            container.innerHTML = ""; // লোডিং টেক্সট মুছে ফেলা
            data.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <video controls style="width:100%; max-width:400px; margin-bottom:10px;">
                        <source src="${video.url}" type="video/mp4">
                        আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
                    </video>
                    <p><strong>${video.name}</strong></p>
                `;
                container.appendChild(card);
            });
        } catch (error) {
            console.error("Error:", error);
            container.innerHTML = "সমস্যা হয়েছে: " + error.message;
        }
    }

    loadVideos();
</script>

</body>
</html>
