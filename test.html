<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভিডিও গ্যালারি</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: auto; padding: 20px; }
        .video-card { background: #f5f5f5; border-radius: 16px; margin-bottom: 20px; overflow: hidden; }
        video { width: 100%; max-height: 300px; background: black; }
        .info { padding: 10px; }
        .delete { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; float: right; }
        a { display: inline-block; margin-bottom: 20px; color: #667eea; }
    </style>
</head>
<body>
    <h2>🎥 সব ভিডিও</h2>
    <a href="index.html">➕ নতুন আপলোড</a>
    <div id="videoList"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zlzpfnhnfhtanuvaskjy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs';
        const BUCKET = 'naruto';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadVideos() {
            const { data, error } = await supabase.storage.from(BUCKET).list('videos/');
            if (error) {
                document.getElementById('videoList').innerHTML = `<p>লোড করতে সমস্যা: ${error.message}</p>`;
                return;
            }
            if (!data || data.length === 0) {
                document.getElementById('videoList').innerHTML = '<p>কোনো ভিডিও নেই। প্রথমে আপলোড করুন।</p>';
                return;
            }
            let html = '';
            for (const file of data) {
                const { data: urlData } = supabase.storage.from(BUCKET).getPublicUrl(`videos/${file.name}`);
                const title = decodeURIComponent(file.name.replace(/^\d+_/, '').replace(/\.[^/.]+$/, ''));
                html += `
                    <div class="video-card">
                        <video controls src="${urlData.publicUrl}"></video>
                        <div class="info">
                            <strong>${title}</strong>
                            <button class="delete" data-path="videos/${file.name}">🗑️ ডিলিট</button>
                        </div>
                    </div>
                `;
            }
            document.getElementById('videoList').innerHTML = html;

            // ডিলিট বাটনে ইভেন্ট
            document.querySelectorAll('.delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const path = btn.getAttribute('data-path');
                    if (confirm('ভিডিও মুছতে চান?')) {
                        await supabase.storage.from(BUCKET).remove([path]);
                        loadVideos(); // রিলোড
                    }
                });
            });
        }
        loadVideos();
    </script>
</body>
</html>
