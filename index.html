<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Classroom - myclassbd.shop</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#0f0f12; color:#eee; height:100vh; overflow:hidden; }
        .container { display:flex; height:100vh; }
        .sidebar { width:340px; background:#1a1721; border-right:1px solid #2a2633; display:flex; flex-direction:column; }
        .chat-area { flex:1; display:flex; flex-direction:column; background:#121016; }
        .header { padding:15px 20px; background:#1e1b24; border-bottom:1px solid #2a2633; display:flex; align-items:center; gap:12px; }
        .group-item { padding:14px 20px; display:flex; align-items:center; gap:12px; cursor:pointer; border-bottom:1px solid #2a2633; }
        .group-item:hover { background:#25222e; }
        .group-avatar { width:48px; height:48px; border-radius:50%; background:#667eea; display:flex; align-items:center; justify-content:center; font-size:20px; color:white; overflow:hidden; }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:3000; }
        .modal-content { background:#1e1b24; padding:25px; border-radius:20px; width:90%; max-width:420px; }
        .input-field { width:100%; padding:14px; margin:10px 0; border-radius:12px; background:#2a2633; border:none; color:white; }
        .btn { padding:12px 20px; border-radius:50px; border:none; cursor:pointer; font-weight:600; }
        .btn-primary { background:#667eea; color:white; }
        .message { max-width:78%; padding:12px 16px; border-radius:18px; margin:8px 12px; }
        .message.sent { background:#667eea; align-self:flex-end; border-bottom-right-radius:5px; }
        .message.received { background:#2a2633; align-self:flex-start; border-bottom-left-radius:5px; }
        .message img { max-width:240px; border-radius:12px; margin-top:8px; cursor:pointer; }
        .input-area { padding:12px; background:#1e1b24; border-top:1px solid #2a2633; display:flex; align-items:center; gap:8px; }
        .preview-area { padding:8px 12px; background:#2a2633; border-top:1px solid #2a2633; display:none; align-items:center; gap:10px; flex-wrap:wrap; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div style="padding:20px; background:linear-gradient(135deg,#667eea,#764ba2); color:white;">
            <h2>Pocket Classroom</h2>
            <div id="userInfo" style="margin-top:10px;"></div>
        </div>

        <div style="padding:15px;">
            <input type="text" id="searchBar" placeholder="🔍 ইউনিক আইডি লিখুন..." onkeyup="searchGroups()" style="width:100%; padding:14px; border-radius:50px; background:#2a2633; border:none; color:white;">
        </div>

        <div style="padding:0 15px 10px;">
            <button onclick="showCreateGroupModal()" class="btn btn-primary" style="width:100%;">+ নতুন গ্রুপ তৈরি করুন</button>
        </div>

        <div id="groupList" style="flex:1; overflow-y:auto;"></div>
        <div id="searchResults" style="flex:1; overflow-y:auto; padding:10px;"></div>
    </div>

    <div class="chat-area" id="chatArea" style="display:none;">
        <div class="header">
            <h3 id="groupTitle"></h3>
            <button onclick="showAdminPanel()" class="btn btn-primary" style="margin-left:10px;">👑 অ্যাডমিন</button>
            <button onclick="startGaleneCall()" class="btn btn-primary" style="margin-left:auto;">🎥 ভিডিও কল</button>
        </div>
        <div id="messages" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px;"></div>
        
        <div id="imagePreviewArea" class="preview-area"></div>
        
        <div class="input-area">
            <button onclick="document.getElementById('chatImage').click()" class="btn" style="background:#2a2633;color:white;width:50px;">📷</button>
            <input type="file" id="chatImage" accept="image/*" style="display:none;" onchange="handleImageSelect(event)">
            <input type="text" id="msgInput" placeholder="মেসেজ লিখুন..." style="flex:1; padding:14px; border-radius:50px; background:#2a2633; border:none; color:white;" onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" class="btn btn-primary" style="width:70px;">পাঠান</button>
        </div>
    </div>
</div>

<!-- Create & Admin Modal (সংক্ষিপ্ত) -->
<div id="createModal" class="modal"> ... </div>
<div id="adminModal" class="modal"> ... </div>

<script>
// ==================== Firebase Config ====================
const firebaseConfig = {
    apiKey: "AIzaSyDTxzgfZ8IuPpqp4Q20cE8JZvif32pDhgc",
    authDomain: "my-class-46989.firebaseapp.com",
    projectId: "my-class-46989",
    storageBucket: "my-class-46989.firebasestorage.app",
    messagingSenderId: "716703687515",
    appId: "1:716703687515:web:b9a11736e7f58e071c307e",
    databaseURL: "https://my-class-46989-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let currentGroupId = null;
let pendingImage = null;

auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        document.getElementById('userInfo').innerHTML = `স্বাগতম, <strong>${user.email}</strong>`;
        loadUserGroups();
    }
});

// Image Select
function handleImageSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        pendingImage = e.target.result;
        showImagePreview();
    };
    reader.readAsDataURL(file);
}

function showImagePreview() {
    const area = document.getElementById('imagePreviewArea');
    area.innerHTML = `
        <img src="${pendingImage}" style="max-height:90px;border-radius:8px;">
        <button onclick="sendPendingImage()" class="btn btn-primary">পাঠান</button>
        <button onclick="cancelImagePreview()" class="btn" style="background:#dc2626;color:white;">বাতিল</button>
    `;
    area.style.display = 'flex';
}

function cancelImagePreview() {
    pendingImage = null;
    document.getElementById('imagePreviewArea').style.display = 'none';
}

function sendPendingImage() {
    if (!pendingImage || !currentGroupId) return;
    db.ref(`messages/${currentGroupId}`).push({
        imageUrl: pendingImage,
        senderId: currentUser.uid,
        senderEmail: currentUser.email,
        timestamp: Date.now()
    });
    cancelImagePreview();
}

function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (text && currentGroupId) {
        db.ref(`messages/${currentGroupId}`).push({
            text: text,
            senderId: currentUser.uid,
            senderEmail: currentUser.email,
            timestamp: Date.now()
        });
        input.value = '';
    }
}

// বাকি ফাংশন (loadUserGroups, searchGroups, openGroup, loadMessages ইত্যাদি) আগের সফল কোড থেকে রাখুন

function loadMessages(groupId) {
    const container = document.getElementById('messages');
    db.ref(`messages/${groupId}`).on('value', (snapshot) => {
        container.innerHTML = '';
        const messages = snapshot.val() || {};
        Object.values(messages).sort((a,b) => a.timestamp - b.timestamp).forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
            if (msg.imageUrl) {
                div.innerHTML = `<img src="${msg.imageUrl}" onclick="openFullImage('${msg.imageUrl}')">`;
            } else {
                div.innerHTML = msg.text || '';
            }
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    });
}

function openFullImage(url) {
    window.open(url, '_blank');
}

// অন্যান্য ফাংশন (createGroup, openGroup, showCreateGroupModal ইত্যাদি) আপনার আগের কোড থেকে রাখুন
// ==================== গ্রুপ তৈরি ====================
async function createGroup() {
    const name = document.getElementById('gName').value.trim();
    let gid = document.getElementById('gId').value.trim().toUpperCase();

    if (!name || !gid) return alert("গ্রুপের নাম এবং ইউনিক আইডি দিন!");

    const snap = await db.ref('groups').orderByChild('groupId').equalTo(gid).once('value');
    if (snap.exists()) return alert("এই ইউনিক আইডি ইতিমধ্যে ব্যবহৃত হয়েছে!");

    const groupId = db.ref('groups').push().key;

    await db.ref(`groups/${groupId}`).set({
        name: name,
        groupId: gid,
        admin: currentUser.uid,
        avatarUrl: groupAvatarBase64,
        createdAt: Date.now()
    });

    await db.ref(`userGroups/${currentUser.uid}/${groupId}`).set(true);

    closeModal();
    alert("✅ গ্রুপ সফলভাবে তৈরি হয়েছে!");
    groupAvatarBase64 = null;
}

// ==================== ইউজারের গ্রুপ লোড ====================
function loadUserGroups() {
    const container = document.getElementById('groupList');
    db.ref(`userGroups/${currentUser.uid}`).on('value', async (snapshot) => {
        container.innerHTML = '';
        const groups = snapshot.val() || {};
        
        if (Object.keys(groups).length === 0) {
            container.innerHTML = `<p style="color:#888;padding:30px;text-align:center;">কোনো গ্রুপ নেই। নতুন গ্রুপ তৈরি করুন।</p>`;
            return;
        }

        for (let groupId in groups) {
            const g = await db.ref(`groups/${groupId}`).once('value');
            const group = g.val();
            if (!group) continue;

            const div = document.createElement('div');
            div.className = 'group-item';
            div.innerHTML = `
                <div class="group-avatar">
                    ${group.avatarUrl ? `<img src="${group.avatarUrl}" style="width:100%;height:100%;object-fit:cover;">` : group.name[0]}
                </div>
                <div>
                    <div style="font-weight:600;">${group.name}</div>
                    <div style="font-size:13px;color:#aaa;">${group.groupId}</div>
                </div>
            `;
            div.onclick = () => openGroup(groupId, group);
            container.appendChild(div);
        }
    });
}

// ==================== সার্চ ====================
function searchGroups() {
    const query = document.getElementById('searchBar').value.trim().toUpperCase();
    const resultsContainer = document.getElementById('searchResults');
    
    if (query.length < 2) {
        resultsContainer.innerHTML = '';
        return;
    }

    db.ref('groups').orderByChild('groupId').equalTo(query).once('value', (snapshot) => {
        resultsContainer.innerHTML = '';
        const groups = snapshot.val() || {};
        
        if (Object.keys(groups).length === 0) {
            resultsContainer.innerHTML = `<p style="color:#888;padding:15px;">কোনো গ্রুপ পাওয়া যায়নি</p>`;
            return;
        }

        for (let groupId in groups) {
            const group = groups[groupId];
            const isOwnGroup = group.admin === currentUser.uid;

            const div = document.createElement('div');
            div.className = 'search-result';
            div.innerHTML = `
                <div style="display:flex; align-items:center; gap:12px;">
                    <div class="group-avatar">${group.avatarUrl ? `<img src="${group.avatarUrl}" style="width:100%;height:100%;object-fit:cover;">` : group.name[0]}</div>
                    <div>
                        <div style="font-weight:600;">${group.name}</div>
                        <div style="color:#aaa;">${group.groupId}</div>
                    </div>
                </div>
            `;

            if (isOwnGroup) {
                div.innerHTML += `<button onclick="openGroup('${groupId}', ${JSON.stringify(group)})" style="margin-top:8px;background:#667eea;color:white;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;width:100%;">গ্রুপ খুলুন</button>`;
            } else {
                div.innerHTML += `<button onclick="sendJoinRequest('${groupId}', '${group.name}')" style="margin-top:8px;background:#10b981;color:white;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;width:100%;">জয়েন রিকোয়েস্ট পাঠান</button>`;
            }
            resultsContainer.appendChild(div);
        }
    });
}

// ==================== জয়েন রিকোয়েস্ট ====================
async function sendJoinRequest(groupId, groupName) {
    await db.ref(`groupRequests/${groupId}/${currentUser.uid}`).set({
        userId: currentUser.uid,
        userEmail: currentUser.email,
        requestedAt: Date.now(),
        status: 'pending'
    });
    alert(`"${groupName}" গ্রুপে জয়েন রিকোয়েস্ট পাঠানো হয়েছে!`);
    document.getElementById('searchBar').value = '';
    document.getElementById('searchResults').innerHTML = '';
}

// ==================== গ্রুপ খোলা ====================
function openGroup(groupId, group) {
    currentGroupId = groupId;
    document.getElementById('groupTitle').innerText = group.name;
    document.getElementById('chatArea').style.display = 'flex';
    loadMessages(groupId);
}

// ==================== মেসেজ লোড ====================
function loadMessages(groupId) {
    const container = document.getElementById('messages');
    db.ref(`messages/${groupId}`).on('value', (snapshot) => {
        container.innerHTML = '';
        const messages = snapshot.val() || {};
        Object.values(messages).sort((a,b) => a.timestamp - b.timestamp).forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
            if (msg.imageUrl) {
                div.innerHTML = `<img src="${msg.imageUrl}" onclick="openFullImage('${msg.imageUrl}')">`;
            } else {
                div.innerHTML = msg.text || '';
            }
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    });
}

function openFullImage(url) {
    window.open(url, '_blank');
}

// ==================== মোডাল কন্ট্রোল ====================
function showCreateGroupModal() {
    document.getElementById('createModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('createModal').style.display = 'none';
}

// ==================== ভিডিও কল ====================
function startGaleneCall() {
    window.open('https://meet.myclassbd.shop', '_blank');
}

// ==================== অ্যাডমিন প্যানেল ====================
function showAdminPanel() {
    if (!currentGroupId) return alert("প্রথমে একটা গ্রুপ খুলুন");
    // আপনার আগের অ্যাডমিন কোড এখানে যোগ করুন
    alert("অ্যাডমিন প্যানেল শিগগিরই পুরোপুরি যোগ করা হবে");
}
    
</script>
</body>
</html>
