<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভিডিও আপলোড</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        .upload-box {
            border: 3px dashed #667eea;
            border-radius: 20px;
            padding: 40px;
            margin: 20px 0;
            background: #f9f9ff;
            cursor: pointer;
        }
        .upload-box:active {
            background: #eef;
        }
        input {
            display: none;
        }
        button {
            background: #667eea;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            width: 100%;
            margin: 10px 0;
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { background: #fff3cd; color: #856404; }
        a {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
        }
        .file-name {
            margin: 10px 0;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <h2>🎬 ভিডিও আপলোড</h2>
    
    <div class="upload-box" id="uploadBox">
        📹 <strong>এখানে ট্যাপ করুন</strong><br>
        <small style="color: #888;">MP4, MOV, WebM (সর্বোচ্চ 100MB)</small>
    </div>
    
    <input type="file" id="fileInput" accept="video/*">
    
    <div id="fileInfo" class="file-name"></div>
    <div id="status"></div>
    
    <br>
    <a href="cartoon.html">🎥 সব ভিডিও দেখুন</a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zlzpfnhnfhtanuvaskjy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs';
        const BUCKET = 'naruto';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const statusDiv = document.getElementById('status');
        
        // বক্সে ক্লিক করলে ফাইল পিকার খুলবে
        uploadBox.addEventListener('click', function() {
            fileInput.click();
        });
        
        // ফাইল সিলেক্ট করলেই আপলোড শুরু হবে (কোনো বাটন চাপার দরকার নেই)
        fileInput.addEventListener('change', async function(e) {
            if (!e.target.files || e.target.files.length === 0) return;
            
            const file = e.target.files[0];
            
            // ভিডিও চেক
            if (!file.type.startsWith('video/')) {
                statusDiv.innerHTML = '❌ শুধু ভিডিও ফাইল আপলোড করুন';
                statusDiv.className = 'error';
                return;
            }
            
            // সাইজ চেক (100MB)
            if (file.size > 100 * 1024 * 1024) {
                statusDiv.innerHTML = '❌ ভিডিও 100MB এর ছোট হতে হবে';
                statusDiv.className = 'error';
                return;
            }
            
            // ফাইলের তথ্য দেখানো
            const sizeMB = (file.size / 1048576).toFixed(2);
            fileInfo.innerHTML = `📹 ${file.name} (${sizeMB} MB)<br>⏳ আপলোড শুরু হচ্ছে...`;
            statusDiv.innerHTML = '⏳ আপলোড হচ্ছে, দয়া করে অপেক্ষা করুন...';
            statusDiv.className = 'loading';
            
            // ইউনিক ফাইলনেম তৈরি
            const ext = file.name.split('.').pop();
            const fileName = Date.now() + '_' + Math.random().toString(36).substring(2, 10) + '.' + ext;
            const filePath = 'videos/' + fileName;
            
            try {
                // Supabase এ আপলোড
                const { error } = await supabase.storage.from(BUCKET).upload(filePath, file);
                
                if (error) throw error;
                
                // সফল
                fileInfo.innerHTML = `✅ ${file.name} - আপলোড সম্পূর্ণ!`;
                statusDiv.innerHTML = '✅ সফল! গ্যালারি পেজে যাচ্ছি...';
                statusDiv.className = 'success';
                
                // 2 সেকেন্ড পর গ্যালারিতে নেওয়া
                setTimeout(() => {
                    window.location.href = 'cartoon.html';
                }, 2000);
                
            } catch (err) {
                // ব্যর্থ
                fileInfo.innerHTML = `❌ ${file.name} - আপলোড ব্যর্থ`;
                statusDiv.innerHTML = `❌ ব্যর্থ: ${err.message}`;
                statusDiv.className = 'error';
                console.error('Upload error:', err);
            }
        });
    </script>
</body>
</html>
