<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>কার্টুন আপলোড</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 8px;
            color: #333;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        /* লেবেল বাটনের স্টাইল */
        .file-label {
            display: block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 16px;
            transition: transform 0.1s;
        }
        .file-label:active {
            transform: scale(0.97);
        }
        .alt-label {
            background: #f0f0f0;
            color: #333;
            margin-bottom: 20px;
        }
        #fileInput {
            display: none;
        }
        .video-info {
            background: #f8f9ff;
            padding: 16px;
            border-radius: 20px;
            margin: 20px 0;
            display: none;
        }
        .video-info.show {
            display: block;
        }
        .video-name {
            font-weight: 600;
            word-break: break-word;
            margin-bottom: 5px;
        }
        .video-size {
            font-size: 12px;
            color: #666;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }
        .progress-bar.show {
            display: block;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }
        .message {
            padding: 12px;
            border-radius: 16px;
            margin: 16px 0;
            text-align: center;
            display: none;
            font-size: 14px;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
        }
        .nav-link {
            text-align: center;
            margin-top: 20px;
        }
        .nav-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #ccc;
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        button.enabled {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 কার্টুন আপলোড</h1>
        <p class="subtitle">আপনার ভিডিও শেয়ার করুন</p>

        <!-- লেবেলের মাধ্যমে ফাইল ইনপুট (কোনো জাভাস্ক্রিপ্ট ক্লিকের দরকার নেই) -->
        <label for="fileInput" class="file-label">📹 ভিডিও নির্বাচন করুন</label>
        <label for="fileInput" class="file-label alt-label">📂 ব্রাউজ করুন</label>
        
        <input type="file" id="fileInput" accept="video/*">

        <div class="video-info" id="videoInfo">
            <div class="video-name" id="videoName"></div>
            <div class="video-size" id="videoSize"></div>
        </div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="message" id="message"></div>
        
        <button id="uploadBtn" disabled>🚀 আপলোড করুন</button>
        
        <div class="nav-link">
            <a href="cartoon.html">🎥 সব ভিডিও দেখুন</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zlzpfnhnfhtanuvaskjy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs';
        const BUCKET_NAME = 'naruto';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let selectedFile = null;
        
        const fileInput = document.getElementById('fileInput');
        const videoInfo = document.getElementById('videoInfo');
        const videoName = document.getElementById('videoName');
        const videoSize = document.getElementById('videoSize');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const messageDiv = document.getElementById('message');
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 4000);
        }
        
        function handleFileSelect(file) {
            if (!file) return;
            if (!file.type.startsWith('video/')) {
                showMessage('শুধু ভিডিও ফাইল সাপোর্ট করে!', 'error');
                return;
            }
            if (file.size > 100 * 1024 * 1024) {
                showMessage('ভিডিও 100MB এর ছোট হতে হবে!', 'error');
                return;
            }
            selectedFile = file;
            videoName.textContent = file.name;
            videoSize.textContent = formatFileSize(file.size);
            videoInfo.classList.add('show');
            uploadBtn.disabled = false;
            uploadBtn.classList.add('enabled');
        }
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                handleFileSelect(e.target.files[0]);
            }
        });
        
        async function uploadVideo() {
            if (!selectedFile) return;
            uploadBtn.disabled = true;
            progressBar.classList.add('show');
            progressFill.style.width = '0%';
            
            const timestamp = Date.now();
            const fileExt = selectedFile.name.split('.').pop();
            const fileName = `${timestamp}_${Math.random().toString(36).substring(7)}.${fileExt}`;
            const filePath = `videos/${fileName}`;
            
            try {
                progressFill.style.width = '50%';
                const { error } = await supabase.storage
                    .from(BUCKET_NAME)
                    .upload(filePath, selectedFile, { cacheControl: '3600', upsert: false });
                if (error) throw error;
                progressFill.style.width = '100%';
                showMessage('✅ ভিডিও আপলোড সফল!', 'success');
                setTimeout(() => {
                    selectedFile = null;
                    videoInfo.classList.remove('show');
                    progressBar.classList.remove('show');
                    fileInput.value = '';
                    uploadBtn.disabled = true;
                    uploadBtn.classList.remove('enabled');
                }, 2000);
            } catch (error) {
                console.error(error);
                showMessage('❌ আপলোড ব্যর্থ: ' + error.message, 'error');
                progressBar.classList.remove('show');
                uploadBtn.disabled = false;
            }
        }
        
        uploadBtn.addEventListener('click', uploadVideo);
    </script>
</body>
</html>
