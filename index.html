<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Classroom - myclassbd.shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Pocket Classroom</h2>
                <div id="userInfo"></div>
            </div>

            <div class="search-box">
                <input type="text" id="searchBar" placeholder="🔍 ইউনিক আইডি লিখুন..." onkeyup="searchGroups()">
            </div>

            <button onclick="showCreateGroupModal()" class="btn-new-group">+ নতুন গ্রুপ তৈরি করুন</button>

            <div id="groupList" class="group-list"></div>
            <div id="searchResults" class="search-results"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea" style="display:none;">
            <div class="chat-header">
                <h3 id="groupTitle"></h3>
                <button onclick="startGaleneCall()" class="video-call-btn">🎥 ভিডিও কল</button>
            </div>
            <div id="messages" class="messages-container"></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="মেসেজ লিখুন..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="send-btn">পাঠান</button>
            </div>
        </div>
    </div>

    <!-- Create Group Modal -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <h3>নতুন গ্রুপ তৈরি করুন</h3>
            <!-- আরও মোডাল কনটেন্ট পরে যোগ করা হবে -->
            <button onclick="closeModal()">বন্ধ</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
