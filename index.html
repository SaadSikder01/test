<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কার্টুন আপলোড করুন</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }
        .upload-area.drag-over {
            border-color: #00d4ff;
            background: #e6f7ff;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .upload-text {
            color: #666;
            margin-bottom: 10px;
        }
        .upload-hint {
            font-size: 12px;
            color: #999;
        }
        #fileInput {
            display: none;
        }
        .video-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        .video-info.show {
            display: block;
        }
        .video-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .video-size {
            font-size: 12px;
            color: #666;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.02);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
            display: none;
        }
        .progress-bar.show {
            display: block;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
            border-radius: 5px;
        }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .nav-links {
            text-align: center;
            margin-top: 20px;
        }
        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 কার্টুন ভিডিও আপলোড</h1>
        <p class="subtitle">আপনার পছন্দের কার্টুন এখানে শেয়ার করুন</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📹</div>
            <div class="upload-text">ক্লিক বা ড্র্যাগ করে ভিডিও নির্বাচন করুন</div>
            <div class="upload-hint">MP4, WebM, MOV ফরম্যাট (সর্বোচ্চ 100MB)</div>
        </div>
        
        <input type="file" id="fileInput" accept="video/*">
        
        <div class="video-info" id="videoInfo">
            <div class="video-name" id="videoName"></div>
            <div class="video-size" id="videoSize"></div>
        </div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="message" id="message"></div>
        
        <button id="uploadBtn" disabled>আপলোড করুন</button>
        
        <div class="nav-links">
            <a href="cartoon.html">🎥 সব ভিডিও দেখুন</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase কনফিগারেশন
        const SUPABASE_URL = 'https://zlzpfnhnfhtanuvaskjy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs';
        const BUCKET_NAME = 'naruto';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let selectedFile = null;
        
        // DOM এলিমেন্ট
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const videoInfo = document.getElementById('videoInfo');
        const videoName = document.getElementById('videoName');
        const videoSize = document.getElementById('videoSize');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const messageDiv = document.getElementById('message');
        
        // ফাইল সাইজ ফরম্যাট করা
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // মেসেজ দেখানো
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        // ফাইল সিলেক্ট হলে
        function handleFileSelect(file) {
            if (!file) return;
            
            // ভিডিও ফাইল চেক
            if (!file.type.startsWith('video/')) {
                showMessage('দয়া করে শুধু ভিডিও ফাইল আপলোড করুন!', 'error');
                return;
            }
            
            // 100MB সাইজ চেক
            if (file.size > 100 * 1024 * 1024) {
                showMessage('ভিডিও 100MB এর ছোট হতে হবে!', 'error');
                return;
            }
            
            selectedFile = file;
            videoName.textContent = file.name;
            videoSize.textContent = formatFileSize(file.size);
            videoInfo.classList.add('show');
            uploadBtn.disabled = false;
        }
        
        // আপলোড ফাংশন
        async function uploadVideo() {
            if (!selectedFile) return;
            
            uploadBtn.disabled = true;
            progressBar.classList.add('show');
            progressFill.style.width = '0%';
            
            // ইউনিক ফাইলনেম তৈরি
            const timestamp = Date.now();
            const fileExt = selectedFile.name.split('.').pop();
            const fileName = `${timestamp}_${Math.random().toString(36).substring(7)}.${fileExt}`;
            const filePath = `videos/${fileName}`;
            
            try {
                // 25% প্রগ্রেস (স্টার্ট)
                progressFill.style.width = '25%';
                
                // সুপাবেসে আপলোড
                const { data, error } = await supabase.storage
                    .from(BUCKET_NAME)
                    .upload(filePath, selectedFile, {
                        cacheControl: '3600',
                        upsert: false
                    });
                
                if (error) throw error;
                
                // 75% প্রগ্রেস (আপলোড শেষ)
                progressFill.style.width = '75%';
                
                // পাবলিক ইউআরএল পাওয়া
                const { data: urlData } = supabase.storage
                    .from(BUCKET_NAME)
                    .getPublicUrl(filePath);
                
                const videoUrl = urlData.publicUrl;
                
                // ডাটাবেসে ভিডিও তথ্য সেভ
                const { error: dbError } = await supabase
                    .from('videos')
                    .insert([
                        {
                            title: selectedFile.name.replace(/\.[^/.]+$/, ""),
                            url: videoUrl,
                            file_path: filePath,
                            size: selectedFile.size,
                            created_at: new Date().toISOString()
                        }
                    ]);
                
                if (dbError) {
                    // যদি ডাটাবেসে সেভ না হয়, তবুও ভিডিও আপলোড হয়েছে
                    console.warn('Database save failed:', dbError);
                }
                
                // 100% প্রগ্রেস
                progressFill.style.width = '100%';
                
                showMessage('ভিডিও সফলভাবে আপলোড হয়েছে! 🎉', 'success');
                
                // রিসেট ফর্ম
                setTimeout(() => {
                    selectedFile = null;
                    videoInfo.classList.remove('show');
                    progressBar.classList.remove('show');
                    progressFill.style.width = '0%';
                    fileInput.value = '';
                    uploadBtn.disabled = true;
                }, 2000);
                
            } catch (error) {
                console.error('Upload error:', error);
                showMessage(`আপলোড ব্যর্থ: ${error.message}`, 'error');
                progressBar.classList.remove('show');
                uploadBtn.disabled = false;
            }
        }
        
        // ইভেন্ট লিসেনার
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) handleFileSelect(file);
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFileSelect(e.target.files[0]);
        });
        
        uploadBtn.addEventListener('click', uploadVideo);
        
        // ডাটাবেস টেবিল চেক (যদি না থাকে তাহলে ক্রিয়েট করতে হবে)
        async function checkDatabase() {
            try {
                // ছোট একটি টেস্ট কোয়েরি
                const { error } = await supabase.from('videos').select('count', { count: 'exact', head: true });
                if (error && error.code === '42P01') {
                    console.warn('⚠️ "videos" টেবিল এখনো তৈরি হয়নি।');
                    console.warn('Supabase Dashboard → SQL Editor → নিচের SQL রান করুন:');
                    console.warn(`
                        CREATE TABLE videos (
                            id SERIAL PRIMARY KEY,
                            title TEXT NOT NULL,
                            url TEXT NOT NULL,
                            file_path TEXT NOT NULL,
                            size BIGINT,
                            created_at TIMESTAMP DEFAULT NOW()
                        );
                    `);
                }
            } catch (e) {
                console.log('Database check skipped');
            }
        }
        
        checkDatabase();
    </script>
</body>
</html>
