<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভিডিও আপলোড</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:disabled {
            background: #ccc;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 8px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h2>🎬 ভিডিও আপলোড</h2>
    
    <!-- সরাসরি ইনপুট ফিল্ড (কোনো লেবেল বা জাভাস্ক্রিপ্ট ট্রিগার ছাড়া) -->
    <input type="file" id="videoInput" accept="video/*" capture>
    
    <div id="fileInfo" style="margin: 10px 0; font-size: 14px;"></div>
    
    <button id="uploadBtn" disabled>আপলোড করুন</button>
    
    <div id="status"></div>
    
    <br>
    <a href="cartoon.html" style="color: #667eea;">🎥 সব ভিডিও দেখুন</a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zlzpfnhnfhtanuvaskjy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs';
        const BUCKET = 'naruto';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const videoInput = document.getElementById('videoInput');
        const fileInfo = document.getElementById('fileInfo');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusDiv = document.getElementById('status');
        
        let selectedFile = null;

        // ভিডিও সিলেক্ট হলে
        videoInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                selectedFile = e.target.files[0];
                const sizeMB = (selectedFile.size / 1048576).toFixed(2);
                fileInfo.innerHTML = `✅ ${selectedFile.name}<br>📦 ${sizeMB} MB`;
                uploadBtn.disabled = false;
            } else {
                selectedFile = null;
                fileInfo.innerHTML = '';
                uploadBtn.disabled = true;
            }
        });

        // আপলোড বাটন
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            uploadBtn.disabled = true;
            statusDiv.innerHTML = '⏳ আপলোড হচ্ছে...';
            statusDiv.className = '';
            
            const ext = selectedFile.name.split('.').pop();
            const fileName = Date.now() + '_' + Math.random().toString(36).substr(2, 6) + '.' + ext;
            const filePath = 'videos/' + fileName;
            
            const { error } = await supabase.storage.from(BUCKET).upload(filePath, selectedFile);
            
            if (error) {
                statusDiv.innerHTML = '❌ ব্যর্থ: ' + error.message;
                statusDiv.className = 'error';
                uploadBtn.disabled = false;
            } else {
                statusDiv.innerHTML = '✅ আপলোড সফল! Redirecting...';
                statusDiv.className = 'success';
                setTimeout(() => {
                    window.location.href = 'cartoon.html';
                }, 1500);
            }
        });
    </script>
</body>
</html>
