<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Upload - Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div style="text-align: center; padding: 50px;">
    <h2>ভিডিও আপলোড করুন</h2>
    <input type="file" id="videoInput" accept="video/*"><br><br>
    <button id="uploadBtn">আপলোড শুরু করুন</button>
    <p id="status"></p>
    <br>
    <a href="videos.html">গ্যালারি দেখুন</a>
</div>

<script>
    const SUPABASE_URL = "https://zlzpfnhnfhtanuvaskjy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs";
    
    // ক্লায়েন্ট তৈরি করার সঠিক নিয়ম
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('uploadBtn').addEventListener('click', async () => {
        const fileInput = document.getElementById('videoInput');
        const status = document.getElementById('status');
        
        if (fileInput.files.length === 0) {
            alert("আগে একটি ফাইল সিলেক্ট করুন!");
            return;
        }

        const file = fileInput.files[0];
        const fileName = `${Date.now()}_${file.name}`;
        status.innerText = "আপলোড শুরু হয়েছে...";
        console.log("Uploading:", fileName);

        try {
            // ১. স্টোরেজে আপলোড
            const { data: storageData, error: storageError } = await _supabase.storage
                .from('naruto')
                .upload(fileName, file);

            if (storageError) throw storageError;

            // ২. লিঙ্ক তৈরি
            const { data: urlData } = _supabase.storage.from('naruto').getPublicUrl(fileName);
            const videoUrl = urlData.publicUrl;

            // ৩. ডেটাবেসে সেভ
            const { error: dbError } = await _supabase
                .from('video_list')
                .insert([{ name: file.name, url: videoUrl }]);

            if (dbError) throw dbError;

            alert("সফলভাবে আপলোড হয়েছে!");
            status.innerText = "আপলোড সম্পন্ন!";
            
        } catch (error) {
            console.error(error);
            alert("সমস্যা হয়েছে: " + error.message);
            status.innerText = "ব্যর্থ হয়েছে।";
        }
    });
</script>

</body>
</html>
