<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভিডিও আপলোড</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: auto; padding: 20px; }
        .btn { display: inline-block; background: #667eea; color: white; padding: 12px 20px; border-radius: 30px; cursor: pointer; margin: 5px; text-align: center; }
        #fileInput { display: none; }
        #uploadBtn { background: #ccc; border: none; padding: 12px; width: 100%; border-radius: 30px; font-size: 16px; margin-top: 15px; }
        #uploadBtn.active { background: #667eea; color: white; cursor: pointer; }
        #status { margin-top: 15px; padding: 10px; border-radius: 8px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>🎬 ভিডিও আপলোড করুন</h2>
    <label for="fileInput" class="btn">📹 ভিডিও নির্বাচন করুন</label>
    <input type="file" id="fileInput" accept="video/*">
    <div id="fileInfo" style="margin: 10px 0;"></div>
    <button id="uploadBtn">🚀 আপলোড করুন</button>
    <div id="status"></div>
    <br><a href="cartoon.html">🎥 দেখুন সব ভিডিও</a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zlzpfnhnfhtanuvaskjy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs';
        const BUCKET = 'naruto';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let selectedFile = null;
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusDiv = document.getElementById('status');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                selectedFile = e.target.files[0];
                fileInfo.innerText = `নির্বাচিত: ${selectedFile.name} (${(selectedFile.size/1048576).toFixed(2)} MB)`;
                uploadBtn.classList.add('active');
                uploadBtn.disabled = false;
            } else {
                selectedFile = null;
                fileInfo.innerText = '';
                uploadBtn.classList.remove('active');
                uploadBtn.disabled = true;
            }
        });

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            uploadBtn.disabled = true;
            statusDiv.style.display = 'block';
            statusDiv.className = '';
            statusDiv.innerText = 'আপলোড হচ্ছে...';

            const ext = selectedFile.name.split('.').pop();
            const fileName = Date.now() + '_' + Math.random().toString(36).substr(2, 6) + '.' + ext;
            const filePath = 'videos/' + fileName;

            const { error } = await supabase.storage.from(BUCKET).upload(filePath, selectedFile);
            if (error) {
                statusDiv.className = 'error';
                statusDiv.innerText = '❌ ব্যর্থ: ' + error.message;
                uploadBtn.disabled = false;
            } else {
                statusDiv.className = 'success';
                statusDiv.innerText = '✅ সফল! পেজ রিফ্রেশ করুন।';
                setTimeout(() => { window.location.href = 'cartoon.html'; }, 1500);
            }
        });
    </script>
</body>
</html>
