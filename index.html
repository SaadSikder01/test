<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>কার্টুন আপলোড করুন</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 1.8rem;
            text-align: center;
            color: #333;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 28px;
            font-size: 0.9rem;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 24px;
            padding: 40px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #fafbff;
            margin-bottom: 20px;
            touch-action: manipulation;
        }
        .upload-area:active {
            background: #f0f2ff;
            transform: scale(0.98);
        }
        .upload-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }
        .upload-text {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .upload-hint {
            font-size: 0.75rem;
            color: #999;
        }
        #fileInput {
            display: none;
        }
        .video-info {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 20px;
            margin: 20px 0;
            display: none;
        }
        .video-info.show {
            display: block;
        }
        .video-name {
            font-weight: 600;
            color: #333;
            word-break: break-word;
            font-size: 0.9rem;
        }
        .video-size {
            font-size: 0.75rem;
            color: #666;
            margin-top: 6px;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            touch-action: manipulation;
        }
        button:active {
            opacity: 0.8;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }
        .progress-bar.show {
            display: block;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
            border-radius: 10px;
        }
        .message {
            padding: 12px;
            border-radius: 16px;
            margin: 16px 0;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
        }
        .nav-links {
            text-align: center;
            margin-top: 24px;
        }
        .nav-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            padding: 8px 16px;
        }
        .alt-upload-btn {
            background: #f0f0f0;
            color: #333;
            margin-top: 12px;
            box-shadow: none;
        }
        @media (max-width: 480px) {
            .container {
                padding: 20px 16px;
            }
            .upload-area {
                padding: 32px 12px;
            }
            .upload-icon {
                font-size: 48px;
            }
            button {
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 কার্টুন আপলোড</h1>
        <p class="subtitle">আপনার কার্টুন ভিডিও শেয়ার করুন</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📱🎥</div>
            <div class="upload-text">এখানে ট্যাপ করুন</div>
            <div class="upload-hint">MP4, WebM, MOV (সর্বোচ্চ 100MB)</div>
        </div>
        
        <input type="file" id="fileInput" accept="video/*">
        
        <div class="video-info" id="videoInfo">
            <div class="video-name" id="videoName"></div>
            <div class="video-size" id="videoSize"></div>
        </div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="message" id="message"></div>
        
        <button id="uploadBtn" disabled>📤 আপলোড করুন</button>
        <button id="chooseFileBtn" class="alt-upload-btn">📂 অন্য ভিডিও বাছাই</button>
        
        <div class="nav-links">
            <a href="cartoon.html">🎥 সব ভিডিও দেখুন</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase কনফিগারেশন
        const SUPABASE_URL = 'https://zlzpfnhnfhtanuvaskjy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenBmbmhuZmh0YW51dmFza2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTcwOTYsImV4cCI6MjA5MjA3MzA5Nn0.u9E9HROJw3kPBu5jgoLs4ZUXHeT8XMefLRw-pChOyTs';
        const BUCKET_NAME = 'naruto';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let selectedFile = null;
        
        // DOM এলিমেন্ট
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const chooseFileBtn = document.getElementById('chooseFileBtn');
        const videoInfo = document.getElementById('videoInfo');
        const videoName = document.getElementById('videoName');
        const videoSize = document.getElementById('videoSize');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const messageDiv = document.getElementById('message');
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        function handleFileSelect(file) {
            if (!file) return;
            if (!file.type.startsWith('video/')) {
                showMessage('শুধু ভিডিও ফাইল আপলোড করুন!', 'error');
                return;
            }
            if (file.size > 100 * 1024 * 1024) {
                showMessage('ভিডিও 100MB এর ছোট হতে হবে!', 'error');
                return;
            }
            selectedFile = file;
            videoName.textContent = file.name;
            videoSize.textContent = formatFileSize(file.size);
            videoInfo.classList.add('show');
            uploadBtn.disabled = false;
        }
        
        async function uploadVideo() {
            if (!selectedFile) return;
            uploadBtn.disabled = true;
            progressBar.classList.add('show');
            progressFill.style.width = '0%';
            
            const timestamp = Date.now();
            const fileExt = selectedFile.name.split('.').pop();
            const fileName = `${timestamp}_${Math.random().toString(36).substring(7)}.${fileExt}`;
            const filePath = `videos/${fileName}`;
            
            try {
                progressFill.style.width = '30%';
                const { error } = await supabase.storage
                    .from(BUCKET_NAME)
                    .upload(filePath, selectedFile, { cacheControl: '3600', upsert: false });
                if (error) throw error;
                
                progressFill.style.width = '80%';
                const { data: urlData } = supabase.storage.from(BUCKET_NAME).getPublicUrl(filePath);
                const videoUrl = urlData.publicUrl;
                
                // ডাটাবেসে সেভ করার চেষ্টা (টেবিল না থাকলে error ইগনোর)
                try {
                    await supabase.from('videos').insert([{
                        title: selectedFile.name.replace(/\.[^/.]+$/, ""),
                        url: videoUrl,
                        file_path: filePath,
                        size: selectedFile.size,
                        created_at: new Date().toISOString()
                    }]);
                } catch (dbErr) {
                    console.log("Database table not ready, but video uploaded.");
                }
                
                progressFill.style.width = '100%';
                showMessage('আপলোড সফল! 🎉', 'success');
                setTimeout(() => {
                    selectedFile = null;
                    videoInfo.classList.remove('show');
                    progressBar.classList.remove('show');
                    fileInput.value = '';
                    uploadBtn.disabled = true;
                }, 2000);
            } catch (err) {
                console.error(err);
                showMessage(`আপলোড ব্যর্থ: ${err.message}`, 'error');
                progressBar.classList.remove('show');
                uploadBtn.disabled = false;
            }
        }
        
        // ইভেন্ট লিসেনার (মোবাইল-সহ)
        uploadArea.addEventListener('click', (e) => {
            e.preventDefault();
            fileInput.click();
        });
        chooseFileBtn.addEventListener('click', () => {
            fileInput.click();
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) handleFileSelect(e.target.files[0]);
        });
        uploadBtn.addEventListener('click', uploadVideo);
        
        // টাচ ডিভাইসের জন্য নিশ্চিত করা
        uploadArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            fileInput.click();
        });
    </script>
</body>
</html>
